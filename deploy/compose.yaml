# Local development harness. ochakai itself targets Google Cloud
# (design doc 0003); this compose file exists for hacking on ochakai and
# trying it out — hence OCHAKAI_INSECURE_DEV.
services:
  ochakai:
    image: ghcr.io/na0fu3y/ochakai:latest
    build:
      context: ..
    ports:
      - "8080:8080"
    environment:
      OCHAKAI_DATABASE_URL: postgres://ochakai:ochakai@db:5432/ochakai?sslmode=disable
      OCHAKAI_INSECURE_DEV: "true" # local only: all requests act as human:anonymous
    depends_on:
      db:
        condition: service_healthy
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ochakai
      POSTGRES_PASSWORD: ochakai
      POSTGRES_DB: ochakai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ochakai"]
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  pgdata:
