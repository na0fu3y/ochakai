openapi: 3.1.0
info:
  title: ochakai REST API
  description: >
    ochakai is a context provider for data agents: metric definitions,
    verified golden queries, interpretation knowledge, glossary terms,
    dataset and table catalog entries, and references (mirrors of external
    material) in one knowledge base. The REST API is a superset
    of the MCP tools — the same operations plus bulk export/import, the
    human-facing browse/revisions/backlinks reads, and attachment writes —
    so users can build their own web UIs. ochakai executes no SQL and uses
    no LLM.
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: /
# Authentication is Cloud Run IAM (Google identity), handled by the
# infrastructure before requests reach ochakai — there is no
# application-level auth scheme. ochakai reads the forwarded identity
# only to record provenance (design docs 0002/0003).
paths:
  /api/v1/knowledge:
    get:
      operationId: searchKnowledge
      summary: Search knowledge (trigram, plus hybrid vector search when configured)
      description: >
        Rejected entries are excluded unless the status filter explicitly
        includes rejected (so agents can check for already-rejected proposals).
        With sort=verified_at the endpoint lists entries by verification age
        (oldest first, never-verified last) instead of searching — the feed
        for golden query canary runs (docs/guides/golden-query-canary.md).
        With sort=usage it lists by demand (most search_hits first, never-used
        oldest-first at the bottom) and each hit carries its usage totals —
        the draft review/promotion feed.
        q and sort are mutually exclusive; combining them is a 400.
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: sort
          in: query
          description: Mutually exclusive with q.
          schema: { type: string, enum: [verified_at, usage] }
        - name: type
          in: query
          schema: { type: array, items: { $ref: "#/components/schemas/Type" } }
          explode: true
        - name: status
          in: query
          schema: { type: array, items: { $ref: "#/components/schemas/Status" } }
          explode: true
        - name: tag
          in: query
          schema: { type: array, items: { type: string } }
          explode: true
        - name: limit
          in: query
          description: >
            Searching: default 10, max 50. With sort=verified_at or
            sort=usage the feed reads more per page: default 100, max 1000.
            Out-of-range values fall back to the default; non-integer values
            are a 400.
          schema: { type: integer }
      responses:
        "200":
          description: >
            Scored hits, verified entries boosted. With sort=verified_at,
            hits are in verification-age order and carry score 0. With
            sort=usage, hits are in demand order, carry score 0, and each
            populates the usage object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: array
                    items: { $ref: "#/components/schemas/SearchHit" }
        "400": { $ref: "#/components/responses/Error" }
    post:
      operationId: createKnowledge
      summary: Create a knowledge entry
      description: >
        Entries default to draft. Anyone who can reach ochakai may set
        status=verified; verified_by records who did (provenance over
        authorization). A live entry with the same type/id is a 409 —
        including rejected ones — but creating over a soft-deleted entry
        revives it (its prior history stays in the revisions).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Knowledge" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Knowledge" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/browse:
    get:
      operationId: browseKnowledge
      summary: Browse one level of the ID hierarchy
      description: >
        IDs are hierarchical slug paths; this returns one level of that
        tree (design doc 0014). Without type: the types with live-entry
        counts (the root). With type (and an optional prefix like
        "sales" or "sales/"): the subdirectories directly under it, each
        with the count of entries beneath, plus the entries at that
        level as a light projection (no body). Rejected and deleted
        entries are excluded, as in search. Entries at one level cap at
        1000 with truncated=true. Browsing records no usage.
      parameters:
        - name: type
          in: query
          schema: { $ref: "#/components/schemas/Type" }
        - name: prefix
          in: query
          description: ID prefix ("a/b" or "a/b/"); requires type.
          schema: { type: string }
      responses:
        "200":
          description: One level of the tree.
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    description: Only at the root (no type given).
                    items:
                      type: object
                      properties:
                        type: { $ref: "#/components/schemas/Type" }
                        count: { type: integer }
                  dirs:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, description: Next ID segment. }
                        count: { type: integer, description: Entries anywhere beneath. }
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { $ref: "#/components/schemas/Type" }
                        id: { type: string }
                        title: { type: string }
                        status: { $ref: "#/components/schemas/Status" }
                        updated_at: { type: string, format: date-time }
                  truncated:
                    type: boolean
                    description: The entry list hit the 1000-per-level cap.
        "400": { $ref: "#/components/responses/Error" }
  /api/v1/context:
    get:
      operationId: getContext
      summary: The one-call read before answering a data question
      description: >
        Searches the knowledge base (verified entries rank higher), returns
        the full entries behind the top hits, and expands one hop through
        links so companion knowledge (the insight explaining a metric, the
        golden query answering the question) arrives in the same response.
        Rejected entries never appear. limit caps the primary entries
        (default 5, max 20); linked companions share a 2×limit total cap.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: type
          in: query
          schema: { type: array, items: { $ref: "#/components/schemas/Type" } }
          explode: true
        - name: status
          in: query
          schema: { type: array, items: { $ref: "#/components/schemas/Status" } }
          explode: true
        - name: tag
          in: query
          schema: { type: array, items: { type: string } }
          explode: true
        - name: limit
          in: query
          schema: { type: integer, default: 5, maximum: 20 }
        - name: min_score
          in: query
          description: >
            Drop hits scoring below this before expansion, for callers that
            inject the pack automatically and prefer nothing over junk.
            Scores are search-mode dependent and uncalibrated (trigram
            similarity plus boosts vs RRF rank fusion) — calibrate against
            your own corpus before use. Non-numeric values are a 400.
          schema: { type: number, default: 0 }
      responses:
        "200":
          description: Ranked hits plus the full entries behind the top ones.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: array
                    items: { $ref: "#/components/schemas/SearchHit" }
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/Knowledge" }
        "400": { $ref: "#/components/responses/Error" }
  /api/v1/knowledge/{type}/{id}:
    parameters:
      - name: type
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Type" }
      - name: id
        in: path
        required: true
        description: >
          Hierarchical IDs keep their slashes as real path separators
          (GET /api/v1/knowledge/queries/sales/monthly-revenue).
        schema: { type: string }
    get:
      operationId: getKnowledge
      summary: Get one knowledge entry
      responses:
        "200":
          description: The entry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Knowledge" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      operationId: updateKnowledge
      summary: Update a knowledge entry (full replacement; revisions retained)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Knowledge" }
      responses:
        "200":
          description: Updated, or unchanged (see the Ochakai-Unchanged header).
          headers:
            Ochakai-Unchanged:
              description: >
                Set to "true" when the payload matched the stored content
                exactly, so nothing was written — no revision, no
                updated_at bump. Absent on a real update.
              schema: { type: string, enum: ["true"] }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Knowledge" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteKnowledge
      summary: Soft-delete a knowledge entry (history retained)
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/usage/{type}/{id}:
    parameters:
      - name: type
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Type" }
      - name: id
        in: path
        required: true
        description: Hierarchical IDs keep their slashes as real path separators.
        schema: { type: string }
    get:
      operationId: getKnowledgeUsage
      summary: Usage totals for one knowledge entry
      description: >
        How often the entry was actually used: appeared in search results,
        fetched individually, or referenced by compile_sql. The measure of
        the write-back loop — evidence for promoting drafts, and a staleness
        signal for verified entries that stopped being used.
      responses:
        "200":
          description: Usage totals.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Usage" }
        "404": { $ref: "#/components/responses/Error" }
    post:
      operationId: reportOutcome
      summary: Report an outcome (worked/failed) for a knowledge entry
      description: >
        The last edge of the write-back loop: after acting on knowledge
        (running a golden query, executing compiled SQL), report whether
        the result was correct. Reports feed the entry's usage totals;
        failed counts against verified entries flag them for
        re-verification. The caller's identity is recorded with each
        report; the optional note travels with the raw event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outcome]
              properties:
                outcome:
                  type: string
                  enum: [worked, failed]
                  description: worked = acting on the entry gave a correct result; failed = wrong or unusable.
                note:
                  type: string
                  maxLength: 2000
                  description: What was run, what went wrong. Recorded with the raw event (pruned with it after 180 days).
      responses:
        "200":
          description: Updated usage totals.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Usage" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/revisions/{type}/{id}:
    parameters:
      - name: type
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Type" }
      - name: id
        in: path
        required: true
        description: Hierarchical IDs keep their slashes as real path separators.
        schema: { type: string }
    get:
      operationId: listKnowledgeRevisions
      summary: Change history for one knowledge entry
      description: >
        Every create/update/delete/attach/detach, newest first, each with
        who made it, when, and the full snapshot as of that change — the
        read surface behind "every change kept as a revision". Works for
        soft-deleted entries too: the audit trail is most interesting
        exactly when the entry is gone.
      parameters:
        - name: limit
          in: query
          description: >
            Default 50, max 200. Out-of-range values fall back to the
            default; non-integer values are a 400.
          schema: { type: integer }
      responses:
        "200":
          description: Revisions, newest first (never empty — create writes rev 1).
          content:
            application/json:
              schema:
                type: object
                properties:
                  revisions:
                    type: array
                    items: { $ref: "#/components/schemas/Revision" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/backlinks/{type}/{id}:
    parameters:
      - name: type
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Type" }
      - name: id
        in: path
        required: true
        description: Hierarchical IDs keep their slashes as real path separators.
        schema: { type: string }
    get:
      operationId: listKnowledgeBacklinks
      summary: Entries whose links point at this entry
      description: >
        The reverse edge of links, most recently updated first: the insight
        that explains a metric links to the metric, not the other way
        round. get_context already follows this edge when packing
        companions; here it is exposed directly so UIs can show
        "linked from" next to an entry's own links. An entry with no
        backlinks returns an empty list (the target entry itself is not
        checked for existence).
      parameters:
        - name: limit
          in: query
          description: >
            Default 20, max 100. Out-of-range values fall back to the
            default; non-integer values are a 400.
          schema: { type: integer }
      responses:
        "200":
          description: Live entries linking to this one, most recently updated first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/Knowledge" }
        "400": { $ref: "#/components/responses/Error" }
  /api/v1/attachments/{type}/{path}:
    parameters:
      - name: type
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Type" }
      - name: path
        in: path
        required: true
        description: >
          "{id}/{name}" — the entry's (possibly hierarchical) ID followed
          by the attachment filename. The final segment is always the
          filename; everything before it is the ID
          (PUT /api/v1/attachments/insights/revenue-reading/weekly.png).
        schema: { type: string }
    put:
      operationId: putAttachment
      summary: Attach a file to a knowledge entry
      description: >
        Stores the raw request body as an attachment, replacing any
        attachment of the same name (kept as a revision). The media type
        is sniffed from the bytes — png, jpeg, webp, pdf, and plain
        text are accepted (never text/html or image/svg+xml: they can
        carry scripts), at most 5 MiB and 20 attachments per entry.
        Reference the file from the entry's markdown body
        (`![baseline](<id last segment>/weekly.png)` or
        `[seeds](<id last segment>/seeds.txt)`) so it is findable and
        survives OKF export/import (design docs 0008, 0013). Requires the
        server to have GCS configured (OCHAKAI_GCS_BUCKET); without it
        the request fails with 501.
      parameters:
        - name: okf_path
          in: query
          required: false
          description: >
            Bundle path a foreign OKF import carried this file at
            (clean, bundle-relative). Export writes the file back there
            so the original body links keep working. Omit for
            attachments born in ochakai.
          schema: { type: string }
      requestBody:
        required: true
        content:
          "*/*":
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Attachment metadata (bytes are fetched with GET).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attachment" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
    get:
      operationId: getAttachment
      summary: Fetch attachment bytes
      description: >
        Returns the file bytes with the stored (sniffed) media type; the
        ETag is the content's SHA-256. Fetching records a usage event
        against the owning entry.
      responses:
        "200":
          description: The attachment bytes.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteAttachment
      summary: Detach a file from a knowledge entry
      description: >
        Removes the attachment (kept as a revision; the content-addressed
        bytes remain referenced by history).
      responses:
        "204": { description: Detached. }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/export:
    get:
      operationId: exportOKF
      summary: Export the knowledge base as an OKF bundle
      description: >
        Streams a tar.gz of the whole knowledge base in Open Knowledge
        Format (markdown + YAML frontmatter, one concept per entry, with
        index.md files). Your knowledge is yours.
      responses:
        "200":
          description: OKF bundle.
          content:
            application/gzip:
              schema: { type: string, format: binary }
  /api/v1/import/ossie:
    post:
      operationId: importOssie
      summary: Import an Apache Ossie semantic model
      description: >
        Accepts Ossie semantic model YAML verbatim. Each model is stored
        for compile, and metrics/table knowledge entries are derived so
        the definitions are searchable. Re-import refreshes definitions
        without clobbering human-curated status, tags, and bodies.
      requestBody:
        required: true
        content:
          application/yaml:
            schema: { type: string }
      responses:
        "200":
          description: Import report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items: { type: string }
                    description: Semantic model names stored.
                  created:
                    type: array
                    items: { type: string }
                    description: URIs of knowledge entries created.
                  updated:
                    type: array
                    items: { type: string }
                    description: URIs of knowledge entries refreshed.
                  unchanged:
                    type: array
                    items: { type: string }
                    description: >
                      URIs of entries whose refreshed definition matched
                      what was already stored, so nothing was written (no
                      revision). Absent when empty.
        "400": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /api/v1/compile:
    post:
      operationId: compileSQL
      summary: Deterministically compile metrics into SQL
      description: >
        Compiles from the imported Ossie semantic model. ochakai never
        executes the SQL and never guesses: requests outside the supported
        subset (single fact + star joins) return 422 with a reason. Any
        verified golden queries about the metrics are returned alongside and
        should be preferred when they answer the question.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompileRequest" }
      responses:
        "200":
          description: Compiled SQL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompileResult" }
        "422": { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Error.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
  schemas:
    Type:
      type: string
      description: >
        Any slug segment works as a type — the built-ins (metrics, queries,
        insights, terms, datasets, tables, references) are recommendations
        with server behavior attached, not a closed set (design docs 0005,
        0016). Slugs are plural, matching the OKF knowledge-catalog
        reference bundles.
      examples: [metrics, queries, insights, terms, datasets, tables, references, runbook]
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$"
    Status:
      type: string
      description: >
        deprecated means "was correct, no longer recommended"; rejected
        means "was never accepted" — the record keeps agents from
        re-proposing the same knowledge.
      enum: [draft, verified, deprecated, rejected]
    Actor:
      type: object
      properties:
        kind: { type: string, enum: [human, agent] }
        name: { type: string }
    Link:
      type: object
      properties:
        rel: { type: string }
        target: { type: string, description: "<type>/<id>" }
    Knowledge:
      type: object
      required: [type, id, title]
      properties:
        type: { $ref: "#/components/schemas/Type" }
        id:
          type: string
          description: >
            Slug segments separated by "/" (hierarchical, mirroring OKF
            concept IDs); the final segment must not be "index".
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}(/[a-zA-Z0-9][a-zA-Z0-9._-]{0,127})*$"
        title: { type: string }
        description: { type: string }
        resource:
          type: string
          description: >
            Canonical URI of the underlying asset (OKF recommended key): the
            table/dataset URI, or for references the external source URL.
            Empty for abstract concepts.
        tags: { type: array, items: { type: string } }
        status: { $ref: "#/components/schemas/Status" }
        status_note:
          type: string
          description: Free-form reason for the current status (why rejected/deprecated).
        created_by: { $ref: "#/components/schemas/Actor", readOnly: true }
        verified_by: { $ref: "#/components/schemas/Actor", readOnly: true }
        verified_at: { type: string, format: date-time, readOnly: true }
        rejected_by: { $ref: "#/components/schemas/Actor", readOnly: true }
        rejected_at: { type: string, format: date-time, readOnly: true }
        links: { type: array, items: { $ref: "#/components/schemas/Link" } }
        attrs:
          type: object
          description: Type-specific structured attributes (e.g. question/sql for query, model/expression for metric).
        body: { type: string, description: Markdown body. }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
          readOnly: true
          description: >
            Attachment metadata (no bytes — fetch them via
            /api/v1/attachments/{type}/{id}/{name}). Managed through the
            attachment endpoints, never through create/update payloads.
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
    Attachment:
      type: object
      description: >
        A file attached to a knowledge entry — a dashboard screenshot, an
        ER diagram, a seeds file (design docs 0008, 0013). Metadata
        travels with the entry; bytes are a separate, deliberate fetch so
        agent context is never flooded with base64.
      properties:
        name: { type: string, description: Filename, unique within the entry. }
        media_type: { type: string, enum: [image/png, image/jpeg, image/webp, application/pdf, text/plain] }
        size: { type: integer }
        sha256: { type: string, description: Content hash; attachments are content-addressed and immutable. }
        okf_path:
          type: string
          description: >
            Bundle path a foreign OKF import carried this file at; export
            writes it back there so body links keep working. Absent for
            attachments born in ochakai (exported to "<type>/<id>/<name>").
        created_by: { $ref: "#/components/schemas/Actor", readOnly: true }
        created_at: { type: string, format: date-time, readOnly: true }
    Usage:
      type: object
      properties:
        search_hits: { type: integer, description: Times the entry appeared in search results. }
        fetches: { type: integer, description: Times the entry was fetched individually. }
        compiles: { type: integer, description: Times compile_sql referenced the entry. }
        worked: { type: integer, description: Outcome reports saying the entry led to a correct result. }
        failed: { type: integer, description: Outcome reports saying the entry led to a wrong or unusable result. }
        last_used_at: { type: string, format: date-time }
    SearchHit:
      allOf:
        - $ref: "#/components/schemas/Knowledge"
        - type: object
          properties:
            score: { type: number }
            usage:
              allOf: [ { $ref: "#/components/schemas/Usage" } ]
              readOnly: true
              description: >
                Usage totals, present only in the sort=usage listing (the
                draft review feed); absent for search results and the
                verified_at feed.
    Revision:
      type: object
      description: >
        One entry in a knowledge entry's change history: who changed it,
        how, when, and the full snapshot as of that change.
      properties:
        rev: { type: integer, description: 1-based, monotonically increasing per entry. }
        change: { type: string, enum: [create, update, delete, attach, detach] }
        changed_by: { $ref: "#/components/schemas/Actor" }
        changed_at: { type: string, format: date-time }
        snapshot: { $ref: "#/components/schemas/Knowledge" }
    CompileRequest:
      type: object
      required: [metrics]
      properties:
        model:
          type: string
          description: Semantic model name; optional when the first metric's knowledge entry links to its model.
        metrics: { type: array, items: { type: string }, minItems: 1 }
        dimensions:
          type: array
          items: { type: string, description: "dataset.field" }
        filters:
          type: array
          items:
            type: object
            required: [field, op, value]
            properties:
              field: { type: string, description: "dataset.field" }
              op: { type: string, enum: ["=", "!=", ">", ">=", "<", "<=", "in", "not_in"] }
              value: {}
        time_grain:
          type: object
          required: [field, grain]
          properties:
            field: { type: string, description: "dataset.field (time column)" }
            grain: { type: string, enum: [day, week, month, quarter, year] }
        limit: { type: integer }
    CompileResult:
      type: object
      properties:
        sql: { type: string, description: Always BigQuery SQL (design doc 0016). }
        datasets_used: { type: array, items: { type: string } }
