      entry = await api('/api/v1/knowledge/' + idPath(card.dataset.id));
    } catch (e) { toast('Load failed: ' + e.message); return; }
    try {
      if (await applyStatus(entry, status, status === 'rejected')) {
        toast(`Marked ${status}.`);
        refreshTree(); // the tree shows status badges (and hides rejected)
        runReview();
      }
    } catch (e) { toast('Failed: ' + e.message); }
  }));
}

/* ============================== editor ============================== */

// prefix (create only) seeds the ID field — the per-directory ＋
// in the tree routes here as #/new/<prefix>/.
async function viewEditor(id, prefix = '') {
  const editing = id !== null;
  let entry = { type: 'Insight', id: prefix, title: '', description: '', tags: [], status: 'draft', status_note: '', attrs: {}, body: '' };
  if (editing) {
    try {
      entry = await api('/api/v1/knowledge/' + idPath(id));
    } catch (e) {
      view.innerHTML = `<div class="error-banner">Could not load ${esc(id)}: ${esc(e.message)}</div>`;
      return;
    }
  }
  const attrsText = entry.attrs && Object.keys(entry.attrs).length ? JSON.stringify(entry.attrs, null, 2) : '';

  // The id is one field, the way the address is one string (design doc
  // 0016) and the way the Move panel already takes it. Its last segment
  // is the entry's name unless a title overrides it (design doc 0022).
  // No datalist here, unlike Move: a focused input that gains one makes
  // Chrome scroll the page to seat the suggestion popup, and this form
  // focuses the field itself.
  const idField = `
        <div class="field">
          <label class="top" for="e-id">ID</label>
          <input type="text" id="e-id" class="mono" value="${esc(editing ? entry.id : prefix)}"
                 placeholder="sales/monthly-revenue"
                 ${editing ? 'disabled' : 'required'}>
          <div class="hint">${editing
            ? 'Where the entry lives (move it from the entry page).'
            : 'The full path, directories separated by “/”. The last segment is the entry’s name, e.g. 売上 or monthly-revenue; place together what should be read together.'}</div>
        </div>`;
  view.innerHTML = `
    <div class="section-title">${editing ? `Edit ${esc(entry.id)}` : 'New knowledge entry'}</div>
    <form class="form" id="editor">
      <div class="row">
        <div class="field">
          <label class="top" for="e-type">Type</label>
          <input type="text" id="e-type" list="type-list" value="${esc(entry.type)}" required>
          <datalist id="type-list">${KNOWN_TYPES.map(t => `<option value="${t}">`).join('')}</datalist>
          <div class="hint">What the entry is: Metric, Golden Query, Insight, Glossary Term, BigQuery Dataset, BigQuery Table, Reference — or any type of your own.</div>
        </div>
        ${idField}
      </div>
      <div class="field">
        <label class="top" for="e-title">Title</label>
        <input type="text" id="e-title" value="${esc(entry.title || '')}">
        <div class="hint">Optional — the file name is the display name; set a title only when that isn't enough.</div>
      </div>
      <div class="field">
        <label class="top" for="e-desc">Description</label>
        <input type="text" id="e-desc" value="${esc(entry.description || '')}">
      </div>
      <div class="row">
        <div class="field">
          <label class="top" for="e-tags">Tags</label>
          <input type="text" id="e-tags" value="${esc((entry.tags || []).join(', '))}" placeholder="finance, monthly">
          <div class="hint">Comma-separated.</div>
        </div>
        <div class="field">
          <label class="top" for="e-status">Status</label>
          <select id="e-status">${STATUSES.map(s => `<option ${s === entry.status ? 'selected' : ''}>${s}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field">
        <label class="top" for="e-note">Status note</label>
        <input type="text" id="e-note" value="${esc(entry.status_note || '')}" placeholder="why deprecated / rejected">
      </div>
      <div class="field">
        <label class="top" for="e-body">Body (markdown)</label>
        <textarea id="e-body" rows="10" class="mono">${esc(entry.body || '')}</textarea>
        <div class="hint">Link to another entry with a markdown link to its path — <code>[revenue](/metrics/revenue.md)</code>. Those links become the entry's links, and a backlink on the other side.</div>
      </div>
      <div class="field">
        <label class="top" for="e-attrs">Attributes (JSON)</label>
        <textarea id="e-attrs" rows="6" class="mono" placeholder='{"question": "…", "sql": "SELECT …"}'>${esc(attrsText)}</textarea>
        <div class="hint">Type-specific structured attributes, e.g. question/sql for a query.</div>
      </div>
      <div id="editor-error"></div>
      <p>
        <button class="btn primary" type="submit">${editing ? 'Save' : 'Create draft'}</button>
        <a class="btn" href="${editing ? '#/k/' + idPath(entry.id) : '#/'}">Cancel</a>
      </p>
    </form>
    `;

  let dirty = false;
  $('#editor').addEventListener('input', () => { dirty = true; });
  unsaved = () => dirty;

  // Creating: put the caret past the folder the ＋ seeded, so only the
  // name is left to type. Deferred by a tick — focusing a field this
  // form just wrote scrolls the page, preventScroll notwithstanding.
  if (!editing) {
    setTimeout(() => {
      const idBox = $('#e-id');
      if (!idBox) return; // navigated away
      idBox.focus({ preventScroll: true });
      idBox.setSelectionRange(idBox.value.length, idBox.value.length);
    });
  }

  $('#editor').addEventListener('submit', async ev => {
    ev.preventDefault();
    const errBox = $('#editor-error');
    errBox.innerHTML = '';
    // A leading "/" is dropped (ids are relative), but a trailing one is
    // not: the ＋ seeds the field with a folder, so "insights/" means the
    // name is still missing — trimming it would quietly create a root
    // entry called "insights" instead.
    const newID = editing ? '' : $('#e-id').value.trim().replace(/^\/+/, '');
    if (!editing && (!newID || newID.endsWith('/'))) {
      errBox.innerHTML = '<div class="error-banner">ID needs a name after the folder, e.g. <code>insights/aov-baseline</code>.</div>';
      $('#e-id').focus();
      return;
    }
    const payload = {
      type: $('#e-type').value.trim(),
      id: editing ? entry.id : newID,
      title: $('#e-title').value.trim(),
      description: $('#e-desc').value.trim(),
      tags: $('#e-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      status: $('#e-status').value,
      status_note: $('#e-note').value.trim(),
      body: $('#e-body').value,
    };
    const attrsRaw = $('#e-attrs').value.trim();
    if (attrsRaw) {
      try { payload.attrs = JSON.parse(attrsRaw); }
      catch (e) { errBox.innerHTML = `<div class="error-banner">Attributes is not valid JSON: ${esc(e.message)}</div>`; return; }
    }
    // No links in the payload: the server derives them from the body
    // (design doc 0024).
    try {
      const saved = editing
        ? await api('/api/v1/knowledge/' + idPath(entry.id), { method: 'PUT', body: payload })
        : await api('/api/v1/knowledge', { method: 'POST', body: payload });
      dirty = false;
      toast(editing ? 'Saved.' : 'Created.');
      refreshTree();
      location.hash = entryHash(saved || payload);
      if (editing) route(); // hash may be unchanged; re-render
    } catch (e) {
      const dupLink = !editing && /already exists/.test(e.message)
        ? ` — <a href="#/k/${idPath(payload.id)}">view the existing ${esc(payload.id)}</a> (edit it, or pick another ID)`
        : '';
      errBox.innerHTML = `<div class="error-banner">${editing ? 'Save' : 'Create'} failed: ${esc(e.message)}${dupLink}</div>`;
    }
  });
}

/* ============================== compile ============================== */

// The compile form renders inside the Compile tab of a Metric entry's
// detail view (metrics are the compilable knowledge; the model resolves
// via the metric's attrs.model). State is per-view, seeded from the
// metric, and written back on every input so it survives tab switches.
function compileFormHTML(c) {
  return `
    <form class="form" id="compile-form">
      <div class="row">
        <div class="field">
          <label class="top" for="c-metrics">Metrics</label>
          <input type="text" id="c-metrics" class="mono" value="${esc(c.metrics)}" placeholder="revenue, order_count" required>
          <div class="hint">Comma-separated metric names.</div>
        </div>
        <div class="field">
          <label class="top" for="c-model">Model</label>
          <input type="text" id="c-model" class="mono" value="${esc(c.model)}" placeholder="models/… (optional — resolved from the Semantic Model entry defining the metric)">
        </div>
      </div>
      <div class="field">
        <label class="top" for="c-dims">Dimensions</label>
        <input type="text" id="c-dims" class="mono" value="${esc(c.dimensions)}" placeholder="customers.region, orders.channel">
        <div class="hint">Comma-separated <code>dataset.field</code>.</div>
      </div>
      <div class="field">
        <label class="top">Filters</label>
        <div class="filters-list" id="c-filters"></div>
        <button class="btn small" type="button" id="c-add-filter">+ Add filter</button>
      </div>
      <div class="row">
        <div class="field">
          <label class="top" for="c-tg-field">Time grain</label>
          <div style="display:flex;gap:.5rem">
            <input type="text" id="c-tg-field" class="mono" value="${esc(c.tgField)}" placeholder="orders.created_at">
            <select id="c-tg-grain" style="width:8rem">
              <option value="">—</option>
              ${['day', 'week', 'month', 'quarter', 'year'].map(g => `<option ${g === c.tgGrain ? 'selected' : ''}>${g}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field">
          <label class="top" for="c-limit">Limit</label>
          <input type="number" id="c-limit" value="${esc(c.limit)}" placeholder="limit" min="1" style="width:7rem">
        </div>
      </div>
      <p><button class="btn primary" type="submit">Compile</button></p>
    </form>
    <div id="compile-result"></div>`;
}

function wireCompileForm(c) {
  const OPS = ['=', '!=', '>', '>=', '<', '<=', 'in', 'not_in'];
  const filtersBox = $('#c-filters');
  function renderFilters() {
    filtersBox.innerHTML = c.filters.map((f, i) => `
      <div class="filter-row">
        <input type="text" class="mono" data-f="field" data-i="${i}" value="${esc(f.field)}" placeholder="orders.status">
        <select data-f="op" data-i="${i}">${OPS.map(o => `<option ${o === f.op ? 'selected' : ''}>${o}</option>`).join('')}</select>
        <input type="text" class="mono" data-f="value" data-i="${i}" value="${esc(f.value)}" placeholder='completed or ["a","b"]'>
        <button class="btn small" type="button" data-del="${i}" title="remove">✕</button>
      </div>`).join('');
    filtersBox.querySelectorAll('input,select').forEach(el =>
      el.addEventListener('input', () => { c.filters[+el.dataset.i][el.dataset.f] = el.value; }));
    filtersBox.querySelectorAll('[data-del]').forEach(b =>
      b.addEventListener('click', () => { c.filters.splice(+b.dataset.del, 1); renderFilters(); }));
  }
  renderFilters();
  $('#c-add-filter').addEventListener('click', () => { c.filters.push({ field: '', op: '=', value: '' }); renderFilters(); });

  // Write inputs back into the state object as they change, so edits
  // survive a switch to another tab and back (the tab re-renders from c).
  const persist = () => {
    c.metrics = $('#c-metrics').value; c.model = $('#c-model').value; c.dimensions = $('#c-dims').value;
    c.tgField = $('#c-tg-field').value; c.tgGrain = $('#c-tg-grain').value;
    c.limit = $('#c-limit').value;
  };
  $('#compile-form').addEventListener('input', persist);

  $('#compile-form').addEventListener('submit', async ev => {
    ev.preventDefault();
    persist();
    const body = {
      metrics: c.metrics.split(',').map(s => s.trim()).filter(Boolean),
    };
    if (c.model.trim()) body.model = c.model.trim();
    const dims = c.dimensions.split(',').map(s => s.trim()).filter(Boolean);
    if (dims.length) body.dimensions = dims;
    const filters = c.filters.filter(f => f.field.trim()).map(f => {
      let value = f.value;
      try { value = JSON.parse(f.value); } catch { /* keep as string */ }
      return { field: f.field.trim(), op: f.op, value };
    });
    if (filters.length) body.filters = filters;
    if (c.tgField.trim() && c.tgGrain) body.time_grain = { field: c.tgField.trim(), grain: c.tgGrain };
    if (c.limit) body.limit = +c.limit;

    const out = $('#compile-result');
    out.innerHTML = '<div class="empty">compiling…</div>';
    try {
      const r = await api('/api/v1/compile', { method: 'POST', body });
      const datasets = (r.datasets_used || []).map(d => `<span class="tag mono">${esc(d)}</span>`).join(' ');
      const notes = (r.notes || []).map(n => `<li>${esc(n)}</li>`).join('');
      const golden = (r.verified_queries || []).map(hitCard).join('');
      out.innerHTML = `
        <div class="toolbar" style="margin-top:1.4rem">
          <strong>Compiled SQL</strong> <span class="badge">BigQuery</span> ${datasets}
          <span class="grow"></span>
          <button class="btn small" id="copy-sql">Copy</button>
        </div>
        <pre id="sql-out">${esc(r.sql || '')}</pre>
        ${notes ? `<ul style="color:var(--muted);font-size:.9rem">${notes}</ul>` : ''}
        ${golden ? `<h3 style="margin-top:1.6rem">Verified golden queries — prefer these when applicable</h3>${golden}` : ''}`;
      $('#copy-sql').addEventListener('click', async () => {
        await navigator.clipboard.writeText(r.sql || '');
        toast('SQL copied.');
      });
    } catch (e) {
      out.innerHTML = `<div class="error-banner">Compile failed: ${esc(e.message)}</div>`;
    }
  });
}

/* ============================== boot ============================== */

// The sidebar disclosure mirrors the filter bar: forced open on wide
// screens (its summary is hidden there), collapsed by default on mobile.
const sideDetails = $('#side-details');
sideDetails.open = matchMedia('(min-width: 801px)').matches;
matchMedia('(min-width: 801px)').addEventListener('change', e => { if (e.matches) sideDetails.open = true; });

// Desktop sidebar toggle — the collapsed choice persists per browser.
const shell = $('#shell');
if (localStorage.getItem('ochakai.sidebar') === 'collapsed') shell.classList.add('side-collapsed');
$('#side-toggle').addEventListener('click', () => {
  const collapsed = shell.classList.toggle('side-collapsed');
  localStorage.setItem('ochakai.sidebar', collapsed ? 'collapsed' : 'open');
});

refreshTree();
route();
</script>
