<!doctype html>
<!-- Sample web UI for the ochakai REST API (api/openapi.yaml).
     A single self-contained file: no build step, no framework, no CDN.
     Serve it from anywhere (main.go proxies /api/v1 to ochakai) and it
     covers the human-facing API surface — search, folder browsing,
     entry details with usage, revision history, backlinks, attachments,
     create/edit with the draft → verified workflow, the draft review
     queue (sort=usage), SQL compilation with Ossie model import, and
     OKF export. (/api/v1/context is an agent surface — see
     api/openapi.yaml.) A starting point for building your own UI. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ochakai</title>
<style>
  :root {
    --bg: #f6f8f6;
    --surface: #ffffff;
    --border: #e2e7e2;
    --text: #1d2721;
    --muted: #66736b;
    --accent: #2e7d5b;
    --accent-strong: #226548;
    --accent-weak: #e7f3ec;
    --code-bg: #f3f5f3;
    --shadow: 0 1px 2px rgba(29, 39, 33, .05);
    --shadow-hover: 0 2px 8px rgba(29, 39, 33, .10);
    --draft-fg: #8a6116; --draft-bg: #fdf4dd; --draft-bd: #e5c877;
    --verified-fg: #1e6b43; --verified-bg: #e3f4e9; --verified-bd: #7cc39a;
    --deprecated-fg: #9a4e12; --deprecated-bg: #fcebdd; --deprecated-bd: #e3a370;
    --rejected-fg: #a03434; --rejected-bg: #fbe7e7; --rejected-bd: #dd9494;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141815;
      --surface: #1c211d;
      --border: #313832;
      --text: #e4e9e5;
      --muted: #98a49c;
      --accent: #5cb388;
      --accent-strong: #7cc7a0;
      --accent-weak: #24352b;
      --code-bg: #242a25;
      --shadow: none;
      --shadow-hover: none;
      --draft-fg: #e0bb64; --draft-bg: #37301c; --draft-bd: #6d5c2c;
      --verified-fg: #82d2a5; --verified-bg: #1e3327; --verified-bd: #35624a;
      --deprecated-fg: #e8a465; --deprecated-bg: #382a1d; --deprecated-bd: #6d4d2e;
      --rejected-fg: #e08e8e; --rejected-bg: #382020; --rejected-bd: #6d3535;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color: var(--accent-strong); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  pre {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: .7rem .9rem; overflow-x: auto; font-size: .86em; line-height: 1.5; margin: .6rem 0;
  }
  code { background: var(--code-bg); border-radius: 4px; padding: .1em .35em; font-size: .88em; }
  pre code { background: none; padding: 0; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 1.2rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 1.2rem; height: 3.3rem; position: sticky; top: 0; z-index: 10;
  }
  .brand { font-weight: 700; font-size: 1.08rem; color: var(--text); display: flex; align-items: center; gap: .45rem; white-space: nowrap; }
  .brand:hover { text-decoration: none; }
  .topnav { display: flex; gap: .2rem; align-self: stretch; }
  .topnav a {
    display: flex; align-items: center; padding: 0 .8rem; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; white-space: nowrap;
  }
  .topnav a:hover { color: var(--text); text-decoration: none; }
  .topnav a.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
  /* Narrow screens: brand + actions on the first row, nav tabs on their own row. */
  @media (max-width: 800px) {
    .topbar { flex-wrap: wrap; height: auto; padding-top: .55rem; gap: .5rem .8rem; }
    .topnav { order: 10; flex-basis: 100%; align-self: auto; overflow-x: auto; }
    .topnav a { padding: .1rem .8rem .5rem; }
    .server-chip { flex: 0 1 auto; min-width: 3rem; }
  }
  .topbar .spacer { flex: 1; }
  .server-chip {
    font-size: .8rem; color: var(--muted); border: 1px solid var(--border); border-radius: 999px;
    padding: .2rem .7rem; background: none; cursor: pointer; font-family: inherit;
    max-width: 16rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .server-chip:hover { border-color: var(--accent); color: var(--text); }

  /* ---- layout ---- */
  main { max-width: 68rem; margin: 0 auto; padding: 1.4rem 1.2rem 4rem; }
  .explore { display: grid; grid-template-columns: 14rem 1fr; gap: 1.6rem; align-items: start; }
  .explore > section { min-width: 0; }
  .rail { position: sticky; top: 4.6rem; }
  /* The rail is a disclosure only on narrow screens: open (summary hidden)
     on desktop, collapsed by default on mobile so the search box — the
     primary action — sits at the top instead of below a page of filters. */
  .rail summary {
    cursor: pointer; font-weight: 600; font-size: .9rem; padding: .3rem 0;
    color: var(--muted); list-style: none; display: none;
  }
  .rail summary::before { content: '▸ '; }
  .rail details[open] > summary::before { content: '▾ '; }
  @media (max-width: 760px) {
    .explore { grid-template-columns: 1fr; }
    .rail { position: static; }
    .rail summary { display: block; }
  }
  .rail h3 {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); margin: 1.2rem 0 .45rem;
  }
  .rail h3:first-child { margin-top: .2rem; }
  .rail label.check { display: flex; align-items: center; gap: .45rem; padding: .17rem 0; cursor: pointer; font-size: .9rem; }
  .rail input[type=checkbox] { accent-color: var(--accent); }
  .count { color: var(--muted); font-size: .8rem; margin-left: auto; }

  /* ---- inputs & buttons ---- */
  input[type=text], input[type=number], select, textarea {
    font: inherit; color: inherit; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: .45rem .65rem; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent-weak); border-color: var(--accent); }
  input:disabled, select:disabled, textarea:disabled {
    background: var(--code-bg); color: var(--muted); cursor: not-allowed;
  }
  textarea { resize: vertical; }
  /* 16px inputs on touch-sized screens so iOS Safari doesn't zoom on focus. */
  @media (max-width: 800px) {
    input[type=text], input[type=number], select, textarea { font-size: 16px; }
  }
  .btn {
    font: inherit; font-weight: 500; cursor: pointer; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    padding: .42rem .85rem; display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-strong); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-strong); color: #fff; }
  .btn.danger:hover { border-color: var(--rejected-bd); color: var(--rejected-fg); }
  .btn.small { padding: .22rem .6rem; font-size: .84rem; }

  .searchbox { display: flex; gap: .6rem; margin-bottom: 1rem; }
  .searchbox input { font-size: 1rem; padding: .55rem .8rem; }

  /* ---- cards ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: .85rem 1.1rem; margin: 0 0 .7rem; box-shadow: var(--shadow);
  }
  .card:hover { box-shadow: var(--shadow-hover); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
  .card .head { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
  .card .head a.title { font-weight: 600; font-size: 1.02rem; color: var(--text); }
  .card .head a.title:hover { color: var(--accent-strong); }
  .type-ico { font-size: 1rem; }
  .card .meta { color: var(--muted); font-size: .8rem; margin-top: .15rem; overflow-wrap: anywhere; }
  .card .desc { margin-top: .3rem; font-size: .92rem; }
  .card pre { margin-bottom: 0; }

  .badge {
    border-radius: 999px; padding: .06rem .6rem; font-size: .74rem; font-weight: 600;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
  }
  .badge.draft { color: var(--draft-fg); background: var(--draft-bg); border-color: var(--draft-bd); }
  .badge.verified { color: var(--verified-fg); background: var(--verified-bg); border-color: var(--verified-bd); }
  .badge.deprecated { color: var(--deprecated-fg); background: var(--deprecated-bg); border-color: var(--deprecated-bd); }
  .badge.rejected { color: var(--rejected-fg); background: var(--rejected-bg); border-color: var(--rejected-bd); }
  .tag {
    border-radius: 999px; padding: .04rem .55rem; font-size: .76rem;
    background: var(--accent-weak); color: var(--accent-strong);
  }
  .empty { color: var(--muted); text-align: center; padding: 2.5rem 0; }
  .weak-matches > summary {
    cursor: pointer; color: var(--muted); font-size: .88rem; padding: .6rem 0;
  }
  .weak-matches .card { opacity: .75; }
  .truncation-note { color: var(--muted); font-size: .86rem; text-align: center; padding: .8rem 0; }
  .feed-banner {
    background: var(--accent-weak); border: 1px solid var(--border); border-radius: 8px;
    padding: .55rem .9rem; margin-bottom: 1rem; font-size: .92rem; color: var(--accent-strong);
  }
  .error-banner {
    background: var(--rejected-bg); border: 1px solid var(--rejected-bd); color: var(--rejected-fg);
    border-radius: 8px; padding: .6rem .9rem; margin: .8rem 0; white-space: pre-wrap; word-break: break-word;
  }

  /* ---- detail ---- */
  .crumbs { color: var(--muted); font-size: .84rem; margin-bottom: .5rem; }
  .crumbs a { color: var(--muted); }
  .detail-head { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; }
  .detail-head h1 { font-size: 1.45rem; margin: 0; }
  .detail-head .actions { margin-left: auto; display: flex; gap: .45rem; flex-wrap: wrap; }
  .provenance { color: var(--muted); font-size: .84rem; margin: .45rem 0 0; }
  .status-note {
    margin-top: .7rem; border-left: 3px solid var(--border); padding: .1rem .8rem;
    color: var(--muted); font-size: .9rem;
  }
  .tabs { display: flex; gap: .2rem; border-bottom: 1px solid var(--border); margin: 1.1rem 0 1rem; overflow-x: auto; }
  .tabs button {
    font: inherit; font-weight: 500; background: none; border: none; cursor: pointer;
    color: var(--muted); padding: .45rem .8rem; border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap;
  }
  .tabs button:hover { color: var(--text); }
  .tabs button.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
  table.kv { border-collapse: collapse; width: 100%; }
  table.kv td { border-bottom: 1px solid var(--border); padding: .45rem .6rem .45rem 0; vertical-align: top; }
  table.kv td.k { color: var(--muted); width: 11rem; white-space: nowrap; }
  /* Narrow screens: stack key over value so wide values (SQL) get the full width. */
  @media (max-width: 640px) {
    table.kv, table.kv tbody, table.kv tr, table.kv td { display: block; width: auto; }
    table.kv td { border-bottom: none; padding: .1rem 0; }
    table.kv td.k { padding-top: .55rem; }
    table.kv tr { border-bottom: 1px solid var(--border); padding-bottom: .45rem; }
  }
  .stat-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr)); gap: .8rem; max-width: 42rem; }
  .stat-tiles .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
  .tile .num { font-size: 1.7rem; font-weight: 700; }
  .tile .lbl { color: var(--muted); font-size: .82rem; }

  /* ---- markdown body ---- */
  .md h1, .md h2, .md h3 { line-height: 1.3; margin: 1.1em 0 .4em; }
  .md h1 { font-size: 1.3rem; } .md h2 { font-size: 1.15rem; } .md h3 { font-size: 1rem; }
  .md p { margin: .5em 0; }
  .md ul, .md ol { margin: .4em 0; padding-left: 1.5em; }
  .md img { max-width: 100%; border: 1px solid var(--border); border-radius: 8px; display: block; margin: .6rem 0; }

  /* ---- browse tree ---- */
  .browse details.node > summary {
    cursor: pointer; display: flex; gap: .5rem; align-items: baseline;
    padding: .25rem .45rem; border-radius: 6px; list-style-position: outside;
  }
  .browse details.node > summary:hover { background: var(--code-bg); }
  .browse details.node > .children {
    margin-left: .85rem; padding-left: .7rem; border-left: 1px solid var(--border);
  }
  .browse .dir-name { overflow-wrap: anywhere; }
  .browse .count { color: var(--muted); font-size: .78rem; }
  .browse .tree-entry {
    display: flex; gap: .55rem; align-items: baseline; flex-wrap: wrap;
    padding: .22rem .45rem; border-radius: 6px; color: inherit; text-decoration: none;
  }
  .browse .tree-entry:hover { background: var(--code-bg); text-decoration: none; }
  .browse .tree-entry .entry-title { color: var(--muted); }
  .browse .tree-entry:hover .entry-title { color: var(--text); }

  /* ---- attachments ---- */
  .att-card { display: flex; gap: 1rem; align-items: flex-start; }
  .att-card a.thumb { flex-shrink: 0; }
  .att-card img {
    max-width: 13rem; max-height: 9rem; object-fit: contain; display: block;
    border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg);
  }
  .att-card a.thumb-file {
    display: flex; align-items: center; justify-content: center;
    width: 6rem; height: 6rem; font-weight: 600; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg);
    text-decoration: none;
  }
  .att-card .att-meta { min-width: 0; display: flex; flex-direction: column; gap: .3rem; align-items: flex-start; }
  .att-card .att-meta .mono { overflow-wrap: anywhere; }
  @media (max-width: 620px) { .att-card { flex-direction: column; } }

  /* ---- forms ---- */
  .form { max-width: 46rem; }
  .form .row { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
  @media (max-width: 620px) { .form .row { grid-template-columns: 1fr; } }
  .form .field { margin-bottom: .9rem; }
  .form label.top { display: block; font-size: .84rem; font-weight: 600; margin-bottom: .25rem; }
  .form .hint { color: var(--muted); font-size: .78rem; margin-top: .2rem; }
  .filters-list .filter-row { display: grid; grid-template-columns: 1fr 6.5rem 1fr 2.2rem; gap: .5rem; margin-bottom: .5rem; }

  .section-title { font-size: 1.25rem; font-weight: 700; margin: .2rem 0 1rem; }
  .toolbar { display: flex; align-items: center; gap: .6rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar .grow { flex: 1; }

  #toast {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); border-radius: 8px; padding: .5rem 1rem;
    font-size: .9rem; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: .95; }
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="#/">🍵 ochakai</a>
  <nav class="topnav" id="topnav">
    <a href="#/" data-route="explore">Explore</a>
    <a href="#/browse" data-route="browse">Browse</a>
    <a href="#/review" data-route="review">Review</a>
    <a href="#/compile" data-route="compile">Compile</a>
    <a href="#/new" data-route="new">New entry</a>
  </nav>
  <span class="spacer"></span>
  <a class="btn small" id="export-link" title="Download the knowledge base as an OKF bundle (tar.gz)">Export OKF</a>
  <button class="server-chip mono" id="server-chip" title="ochakai base URL (click to change)"></button>
</header>
<main id="view"></main>
<div id="toast"></div>

<script>
'use strict';

/* ============================== helpers ============================== */

const $ = s => document.querySelector(s);
const view = $('#view');

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

const TYPE_ICONS = { metric: '📊', query: '🧾', insight: '💡', term: '📖', table: '🗃️' };
const icon = t => TYPE_ICONS[t] || '📄';
const KNOWN_TYPES = Object.keys(TYPE_ICONS);
const STATUSES = ['draft', 'verified', 'deprecated', 'rejected'];

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}
function actorStr(a) {
  if (!a || !a.name) return '';
  return (a.kind === 'agent' ? '🤖 ' : '👤 ') + a.name;
}
// Whole days since an ISO timestamp (null for unparseable input).
function daysSince(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : Math.floor((Date.now() - d.getTime()) / 86400000);
}
function fmtAge(days) {
  if (days === null) return '';
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  return days + ' days ago';
}
function fmtSize(n) {
  if (!n && n !== 0) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
// URL path for an entry; hierarchical IDs keep their slashes.
function idPath(type, id) {
  return encodeURIComponent(type) + '/' + String(id).split('/').map(encodeURIComponent).join('/');
}
const entryHash = e => '#/k/' + idPath(e.type, e.id);

/* ---- tiny markdown renderer (headings, lists, code, links, emphasis, images) ---- */
// resolveImg maps an image reference from the body to a URL (the detail
// view resolves entry-relative references to attachment URLs); references
// it cannot resolve stay literal text rather than rendering broken images.
function md(src, resolveImg) {
  const lines = String(src ?? '').split('\n');
  let out = '', inCode = false, inList = null, para = [];
  const img = (m, alt, ref) => {
    const url = /^https?:/.test(ref) ? ref : resolveImg && resolveImg(ref);
    return url ? `<img src="${url}" alt="${alt}" loading="lazy">` : m;
  };
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|\W)\*([^*\n]+)\*(?=\W|$)/g, '$1<em>$2</em>')
    .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, img)
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  const flushPara = () => { if (para.length) { out += '<p>' + inline(para.join(' ')) + '</p>'; para = []; } };
  const flushList = () => { if (inList) { out += `</${inList}>`; inList = null; } };
  for (const line of lines) {
    if (/^```/.test(line)) {
      flushPara(); flushList();
      out += inCode ? '</code></pre>' : '<pre><code>';
      inCode = !inCode;
      continue;
    }
    if (inCode) { out += esc(line) + '\n'; continue; }
    const h = line.match(/^(#{1,3})\s+(.*)/);
    if (h) { flushPara(); flushList(); out += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
    const li = line.match(/^\s*([-*]|\d+\.)\s+(.*)/);
    if (li) {
      flushPara();
      const want = /^\d/.test(li[1]) ? 'ol' : 'ul';
      if (inList !== want) { flushList(); out += `<${want}>`; inList = want; }
      out += '<li>' + inline(li[2]) + '</li>';
      continue;
    }
    if (!line.trim()) { flushPara(); flushList(); continue; }
    para.push(line.trim());
  }
  if (inCode) out += '</code></pre>';
  flushPara(); flushList();
  return out;
}

/* ============================== api ============================== */

function baseURL() {
  return (localStorage.getItem('ochakai.base') ||
    (location.protocol.startsWith('http') ? location.origin : 'http://localhost:8080')).replace(/\/$/, '');
}
function refreshServerChip() {
  $('#server-chip').textContent = baseURL();
  $('#export-link').href = baseURL() + '/api/v1/export';
}
$('#server-chip').addEventListener('click', () => {
  const v = prompt('ochakai base URL', baseURL());
  if (v !== null) {
    localStorage.setItem('ochakai.base', v.trim().replace(/\/$/, ''));
    refreshServerChip();
    route();
  }
});

async function api(path, opts = {}) {
  const init = { method: opts.method || 'GET' };
  if (opts.raw !== undefined) {
    init.body = opts.raw; // raw bytes (attachment upload), no JSON envelope
  } else if (opts.body !== undefined) {
    init.headers = { 'Content-Type': 'application/json' };
    init.body = JSON.stringify(opts.body);
  }
  const res = await fetch(baseURL() + path, init);
  if (!res.ok) {
    let msg = res.status + ' ' + res.statusText;
    try {
      const text = await res.text();
      try { msg = JSON.parse(text).error || text; } catch { msg = text || msg; }
    } catch { /* keep status text */ }
    throw new Error(msg);
  }
  return res.status === 204 ? null : res.json();
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ============================== router ============================== */

// Set by the editor while it holds unsaved changes: route() asks before
// discarding them on hash navigation, beforeunload warns on real navigation.
let unsaved = null; // () => boolean
window.addEventListener('beforeunload', e => { if (unsaved && unsaved()) e.preventDefault(); });

function route() {
  if (unsaved && unsaved() && !confirm('Discard unsaved changes?')) {
    // Put the URL back; replaceState does not re-fire hashchange.
    history.replaceState(null, '', route._current || '#/');
    return;
  }
  unsaved = null;
  route._current = location.hash || '#/';
  const hash = location.hash.replace(/^#\/?/, '');
  const [head, ...rest] = hash.split('/');
  document.querySelectorAll('#topnav a').forEach(a => a.classList.remove('active'));
  const mark = r => { const a = document.querySelector(`#topnav a[data-route="${r}"]`); if (a) a.classList.add('active'); };
  if (head === 'k' && rest.length >= 2) {
    mark('explore');
    viewDetail(decodeURIComponent(rest[0]), rest.slice(1).map(decodeURIComponent).join('/'));
  } else if (head === 'edit' && rest.length >= 2) {
    viewEditor(decodeURIComponent(rest[0]), rest.slice(1).map(decodeURIComponent).join('/'));
  } else if (head === 'new') {
    mark('new');
    viewEditor(null, null);
  } else if (head === 'browse') {
    mark('browse');
    viewBrowse();
  } else if (head === 'review') {
    mark('review');
    viewReview();
  } else if (head === 'compile') {
    mark('compile');
    viewCompile();
  } else {
    mark('explore');
    viewExplore();
  }
}
window.addEventListener('hashchange', route);

/* ============================== explore ============================== */

// Filter state survives navigation within the session.
const explore = { q: '', types: new Set(), statuses: new Set(), tag: '', staleFeed: false, feedAll: false };

// If the viewport grows past the breakpoint while the filter disclosure is
// collapsed, its summary disappears — reopen it so filters stay reachable.
matchMedia('(min-width: 761px)').addEventListener('change', e => {
  const d = document.getElementById('rail-details');
  if (d && e.matches) d.open = true;
});

function viewExplore() {
  const typeChecks = KNOWN_TYPES.map(t => `
    <label class="check"><input type="checkbox" data-type="${t}" aria-label="type ${t}" ${explore.types.has(t) ? 'checked' : ''}>
      <span class="type-ico">${icon(t)}</span>${t}</label>`).join('');
  const extraTypes = [...explore.types].filter(t => !KNOWN_TYPES.includes(t)).map(t => `
    <label class="check"><input type="checkbox" data-type="${esc(t)}" aria-label="type ${esc(t)}" checked>
      <span class="type-ico">${icon(t)}</span>${esc(t)}</label>`).join('');
  const statusChecks = STATUSES.map(s => `
    <label class="check"><input type="checkbox" data-status="${s}" aria-label="status ${s}" ${explore.statuses.has(s) ? 'checked' : ''}>
      <span class="badge ${s}">${s}</span></label>`).join('');
  // Filters collapse into a disclosure on narrow screens; keep it open on
  // wide ones (the summary is hidden there, so it could never be reopened).
  const wide = matchMedia('(min-width: 761px)').matches;

  view.innerHTML = `
  <div class="explore">
    <aside class="rail">
      <details id="rail-details" ${wide ? 'open' : ''}>
        <summary>Filters</summary>
        <h3>Type</h3>
        ${typeChecks}${extraTypes}
        <input type="text" id="f-type-extra" placeholder="other type…" aria-label="other type" style="margin-top:.3rem;font-size:.84rem;padding:.25rem .5rem">
        <h3>Status</h3>
        ${statusChecks}
        <h3>Tag</h3>
        <input type="text" id="f-tag" placeholder="tag" aria-label="tag" value="${esc(explore.tag)}" style="font-size:.84rem;padding:.3rem .5rem">
        <h3>Feed</h3>
        <label class="check"><input type="checkbox" id="f-stale" aria-label="verification age feed" ${explore.staleFeed ? 'checked' : ''}> verification age</label>
        <div class="hint" style="color:var(--muted);font-size:.76rem">Oldest-verified first — the canary feed for re-checking golden queries.</div>
      </details>
    </aside>
    <section>
      ${explore.staleFeed
        ? `<div class="feed-banner">Verification-age feed — oldest verified first, the canary list for
           re-checking golden queries. Uncheck <strong>verification age</strong> to search.</div>`
        : `<div class="searchbox">
             <input type="text" id="q" placeholder="Search metrics, golden queries, insights, terms, tables…"
                    value="${esc(explore.q)}" autocomplete="off">
           </div>`}
      <div id="results"><div class="empty">…</div></div>
    </section>
  </div>`;

  const rerun = () => runSearch();
  $('#q')?.addEventListener('input', () => { explore.q = $('#q').value; debounce(rerun, 250); });
  // Autofocus is a desktop nicety; on touch screens it pops the keyboard
  // over the page before the user asked for it.
  if (matchMedia('(pointer: fine)').matches) $('#q')?.focus({ preventScroll: true });
  document.querySelectorAll('.rail input[data-type]').forEach(cb =>
    cb.addEventListener('change', () => { cb.checked ? explore.types.add(cb.dataset.type) : explore.types.delete(cb.dataset.type); rerun(); }));
  document.querySelectorAll('.rail input[data-status]').forEach(cb =>
    cb.addEventListener('change', () => { cb.checked ? explore.statuses.add(cb.dataset.status) : explore.statuses.delete(cb.dataset.status); rerun(); }));
  $('#f-type-extra').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.value.trim()) { explore.types.add(e.target.value.trim()); viewExplore(); }
  });
  $('#f-tag').addEventListener('input', () => { explore.tag = $('#f-tag').value.trim(); debounce(rerun, 250); });
  $('#f-stale').addEventListener('change', () => { explore.staleFeed = $('#f-stale').checked; explore.feedAll = false; viewExplore(); });

  runSearch();
}

function debounce(fn, ms) {
  clearTimeout(debounce._t);
  debounce._t = setTimeout(fn, ms);
}

// Below this score a lexical hit is almost certainly noise: real matches
// carry a 0.3 substring bonus, while trigram similarity of unrelated text
// hovers near the server's 0.05 floor (plus a 0.05 verified boost). Only
// meaningful in lexical mode — hybrid (RRF) scores live on a ~1/60 scale,
// detected below by the top score, where no useful floor exists.
const WEAK_SCORE = 0.15;

async function runSearch() {
  const out = $('#results');
  if (!out) return;
  const p = new URLSearchParams();
  if (explore.staleFeed) p.set('sort', 'verified_at');
  else if (explore.q) p.set('q', explore.q);
  for (const t of explore.types) p.append('type', t);
  for (const s of explore.statuses) p.append('status', s);
  if (explore.tag) p.append('tag', explore.tag);
  // Search caps at 50 server-side; the canary feed pages larger (100,
  // expandable to the server max of 1000 via the load-more note).
  const limit = explore.staleFeed ? (explore.feedAll ? 1000 : 100) : 50;
  p.set('limit', String(limit));
  const my = runSearch._seq = (runSearch._seq || 0) + 1;
  try {
    const { hits } = await api('/api/v1/knowledge?' + p);
    if (my !== runSearch._seq || out !== $('#results')) return; // stale response
    if (!hits || !hits.length) {
      out.innerHTML = `<div class="empty">No knowledge found${explore.q ? ' for “' + esc(explore.q) + '”' : ''}.</div>`;
      return;
    }
    // With a query, split off low-relevance hits so junk doesn't render as
    // if it matched — semantic/trigram search always returns *something*.
    let strong = hits, weak = [];
    if (explore.q && !explore.staleFeed && hits[0].score > 0.05) {
      strong = hits.filter(h => h.score >= WEAK_SCORE);
      weak = hits.filter(h => h.score < WEAK_SCORE);
    }
    let html = strong.map(hitCard).join('');
    if (!strong.length) {
      html = `<div class="empty">No strong matches for “${esc(explore.q)}”.</div>`;
    }
    if (weak.length) {
      html += `<details class="weak-matches"><summary>${weak.length} weak match${weak.length > 1 ? 'es' : ''} —
        barely related, probably noise</summary>${weak.map(hitCard).join('')}</details>`;
    }
    if (hits.length >= limit) {
      html += explore.staleFeed && !explore.feedAll
        ? `<div class="truncation-note">Showing the first ${limit} entries ·
             <a href="#" id="feed-more">load up to 1000</a></div>`
        : `<div class="truncation-note">Showing the first ${limit} ${explore.q ? 'matches' : 'entries'}
             (server cap) — narrow with filters or a more specific query.</div>`;
    }
    out.innerHTML = html;
    $('#feed-more')?.addEventListener('click', e => { e.preventDefault(); explore.feedAll = true; runSearch(); });
  } catch (e) {
    if (my !== runSearch._seq || out !== $('#results')) return;
    out.innerHTML = `<div class="error-banner">Search failed: ${esc(e.message)}</div>`;
  }
}

function hitCard(h) {
  const tags = (h.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const who = actorStr(h.status === 'verified' ? h.verified_by || h.created_by : h.created_by);
  const meta = [
    `<span class="mono">ochakai://${esc(h.type)}/${esc(h.id)}</span>`,
    who ? esc(who) : '',
    h.verified_at ? 'verified ' + esc(fmtDate(h.verified_at)) : (h.updated_at ? 'updated ' + esc(fmtDate(h.updated_at)) : ''),
  ].filter(Boolean).join(' · ');
  const sql = h.attrs && h.attrs.sql ? `<pre>${esc(h.attrs.sql)}</pre>` : '';
  return `<article class="card">
    <div class="head">
      <span class="type-ico" title="${esc(h.type)}">${icon(h.type)}</span>
      <a class="title" href="${entryHash(h)}">${esc(h.title)}</a>
      <span class="badge ${esc(h.status)}">${esc(h.status)}</span>
      ${tags}
    </div>
    <div class="meta">${meta}</div>
    ${h.description ? `<div class="desc">${esc(h.description)}</div>` : ''}
    ${sql}
  </article>`;
}

/* ============================== browse ============================== */

// The folder view of hierarchical IDs (design doc 0014): types at the
// root, then ID segments as directories, loaded one level per request.
// Expanded nodes survive navigation within the session and are restored
// (re-fetched) when the tab is reopened.
const browse = { open: new Set() }; // keys: type + '␀' + prefix

function viewBrowse() {
  view.innerHTML = `
  <section class="browse">
    <p class="provenance" style="margin-top:0">Knowledge as a folder tree — types at the root, hierarchical IDs
    (<code>query/sales/monthly-revenue</code>) as directories. Rejected entries are hidden, as in search.</p>
    <div id="tree"><div class="empty">…</div></div>
  </section>`;
  const tree = $('#tree');
  api('/api/v1/browse').then(res => {
    if (tree !== $('#tree')) return; // navigated away
    const types = res.types || [];
    if (!types.length) {
      tree.innerHTML = '<div class="empty">No knowledge yet.</div>';
      return;
    }
    tree.innerHTML = types.map(t => nodeHTML(t.type, '', `<span class="type-ico">${icon(t.type)}</span>` +
      `<span class="dir-name">${esc(t.type)}</span>`, t.count)).join('');
    wireNodes(tree);
  }).catch(e => {
    if (tree === $('#tree')) tree.innerHTML = `<div class="error-banner">Browse failed: ${esc(e.message)}</div>`;
  });
}

function nodeHTML(type, prefix, label, count) {
  const key = type + '␀' + prefix;
  return `<details class="node" data-type="${esc(type)}" data-prefix="${esc(prefix)}" ${browse.open.has(key) ? 'open' : ''}>
    <summary>${label}<span class="count">${count}</span></summary>
    <div class="children"><div class="empty">…</div></div>
  </details>`;
}

// wireNodes attaches lazy loading to every not-yet-wired node under
// root, and immediately loads the ones restored as open.
function wireNodes(root) {
  root.querySelectorAll('details.node:not([data-wired])').forEach(d => {
    d.dataset.wired = '1';
    const key = d.dataset.type + '␀' + d.dataset.prefix;
    const load = () => loadNode(d);
    d.addEventListener('toggle', () => {
      d.open ? browse.open.add(key) : browse.open.delete(key);
      if (d.open && !d.dataset.loaded) load();
    });
    if (d.open) load();
  });
}

async function loadNode(d) {
  d.dataset.loaded = '1';
  const box = d.querySelector(':scope > .children');
  const type = d.dataset.type, prefix = d.dataset.prefix;
  try {
    const res = await api(`/api/v1/browse?type=${encodeURIComponent(type)}&prefix=${encodeURIComponent(prefix)}`);
    const dirs = (res.dirs || []).map(dir => nodeHTML(type, prefix + dir.name + '/',
      `<span class="type-ico">📁</span><span class="dir-name mono">${esc(dir.name)}/</span>`, dir.count)).join('');
    const entries = (res.entries || []).map(e => {
      const seg = e.id.slice(prefix.length);
      return `<a class="tree-entry" href="#/k/${idPath(e.type, e.id)}">
        <span class="mono">${esc(seg)}</span>
        <span class="entry-title">${esc(e.title)}</span>
        <span class="badge ${esc(e.status)}">${esc(e.status)}</span>
      </a>`;
    }).join('');
    const note = res.truncated
      ? `<div class="truncation-note">Showing the first 1000 entries at this level — a directory this wide is
         better split into subdirectories.</div>` : '';
    box.innerHTML = (dirs + entries + note) || '<div class="empty">Empty.</div>';
    wireNodes(box);
  } catch (e) {
    delete d.dataset.loaded; // reopen retries
    box.innerHTML = `<div class="error-banner">Load failed: ${esc(e.message)}</div>`;
  }
}

/* ============================== detail ============================== */

async function viewDetail(type, id) {
  view.innerHTML = '<div class="empty">…</div>';
  let entry;
  try {
    entry = await api('/api/v1/knowledge/' + idPath(type, id));
  } catch (e) {
    view.innerHTML = `<div class="error-banner">Could not load ${esc(type)}/${esc(id)}: ${esc(e.message)}</div>`;
    return;
  }

  const prov = [
    entry.created_by && entry.created_by.name ? `created by ${actorStr(entry.created_by)} ${fmtDate(entry.created_at)}` : `created ${fmtDate(entry.created_at)}`,
    entry.verified_by && entry.verified_by.name ? `verified by ${actorStr(entry.verified_by)} ${fmtDate(entry.verified_at)}` : '',
    entry.rejected_by && entry.rejected_by.name ? `rejected by ${actorStr(entry.rejected_by)} ${fmtDate(entry.rejected_at)}` : '',
    entry.updated_at && entry.updated_at !== entry.created_at ? `updated ${fmtDate(entry.updated_at)}` : '',
  ].filter(Boolean).join(' · ');

  const tags = (entry.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  // Any transition the API allows is offered here (provenance over
  // authorization, design doc 0002) — only the current status is hidden.
  // "Mark draft" doubles as the undo for a stray one-click Verify.
  const canVerify = entry.status !== 'verified';
  const canDraft = entry.status !== 'draft';
  const canDeprecate = entry.status !== 'deprecated';
  const canReject = entry.status !== 'rejected';
  const atts = entry.attachments || [];

  view.innerHTML = `
    <nav class="crumbs mono"><a href="#/">knowledge</a> / ${esc(entry.type)} / ${esc(entry.id)}</nav>
    <div class="detail-head">
      <span class="type-ico" style="font-size:1.4rem">${icon(entry.type)}</span>
      <h1>${esc(entry.title)}</h1>
      <span class="badge ${esc(entry.status)}">${esc(entry.status)}</span>
      ${tags}
      <span class="actions">
        ${canVerify ? '<button class="btn small primary" id="act-verify">✓ Verify</button>' : ''}
        ${canDraft ? '<button class="btn small" id="act-draft" title="Back to draft (clears verification / rejection provenance)">Mark draft</button>' : ''}
        ${canDeprecate ? '<button class="btn small" id="act-deprecate">Deprecate</button>' : ''}
        ${canReject ? '<button class="btn small danger" id="act-reject">Reject</button>' : ''}
        <a class="btn small" href="#/edit/${idPath(entry.type, entry.id)}">Edit</a>
        <button class="btn small danger" id="act-delete">Delete</button>
      </span>
    </div>
    <div class="provenance">${esc(prov)}</div>
    ${entry.status_note ? `<div class="status-note">${esc(entry.status_note)}</div>` : ''}
    <div class="tabs" id="tabs">
      <button data-tab="overview" class="active">Overview</button>
      <button data-tab="attrs">Attributes</button>
      <button data-tab="links">Links${entry.links && entry.links.length ? ' (' + entry.links.length + ')' : ''}</button>
      <button data-tab="attachments">Attachments${atts.length ? ' (' + atts.length + ')' : ''}</button>
      <button data-tab="linked">Linked from</button>
      <button data-tab="usage">Usage</button>
      <button data-tab="history">History</button>
    </div>
    <div id="tab-body"></div>`;

  // Attachment paths and image resolution (design doc 0008). Body links
  // are OKF bundle references: relative to the entry document's directory
  // ("<type>/<id parent>/"), or bundle-root when they start with "/".
  const lastSeg = entry.id.split('/').pop();
  const idParent = entry.id.includes('/') ? entry.id.slice(0, entry.id.lastIndexOf('/')) : '';
  const docDir = entry.type + (idParent ? '/' + idParent : '');
  const attPath = name => '/api/v1/attachments/' + idPath(entry.type, entry.id) + '/' + encodeURIComponent(name);
  const attURL = name => baseURL() + attPath(name);
  const normalize = p => {
    const out = [];
    for (const seg of p.split('/')) {
      if (!seg || seg === '.') continue;
      if (seg === '..') out.pop(); else out.push(seg);
    }
    return out.join('/');
  };
  const resolveImg = ref => {
    const p = normalize(ref.startsWith('/') ? ref : docDir + '/' + ref);
    const canonical = a => entry.type + '/' + entry.id + '/' + a.name;
    let hit = atts.find(a => p === (a.okf_path || canonical(a)) || p === canonical(a));
    // Forgiving fallback: names are unique within the entry, so a filename
    // match resolves references written against a layout we don't know.
    hit = hit || atts.find(a => a.name === ref.split('/').pop());
    return hit ? attURL(hit.name) : null;
  };

  const tabs = {
    overview: () => `
      ${entry.description ? `<p style="font-size:1.02rem">${esc(entry.description)}</p>` : ''}
      ${entry.body ? `<div class="md">${md(entry.body, resolveImg)}</div>` : ''}
      ${!entry.description && !entry.body ? '<div class="empty">No description or body.</div>' : ''}`,
    attrs: () => {
      const attrs = entry.attrs || {};
      const keys = Object.keys(attrs);
      if (!keys.length) return '<div class="empty">No structured attributes.</div>';
      return '<table class="kv">' + keys.map(k => {
        const v = attrs[k];
        const rendered = typeof v === 'string' && (k === 'sql' || v.includes('\n'))
          ? `<pre>${esc(v)}</pre>`
          : typeof v === 'string' ? esc(v) : `<pre>${esc(JSON.stringify(v, null, 2))}</pre>`;
        return `<tr><td class="k mono">${esc(k)}</td><td>${rendered}</td></tr>`;
      }).join('') + '</table>';
    },
    links: () => {
      const links = entry.links || [];
      if (!links.length) return '<div class="empty">No links to other entries.</div>';
      return '<table class="kv">' + links.map(l => {
        const seg = String(l.target || '').split('/');
        const href = seg.length >= 2 ? '#/k/' + idPath(seg[0], seg.slice(1).join('/')) : null;
        return `<tr><td class="k">${esc(l.rel)}</td>
          <td>${href ? `<a class="mono" href="${href}">${esc(l.target)}</a>` : `<span class="mono">${esc(l.target)}</span>`}</td></tr>`;
      }).join('') + '</table>';
    },
    attachments: () => {
      const cards = atts.map(a => {
        const isImage = (a.media_type || '').startsWith('image/');
        const thumb = isImage
          ? `<a class="thumb" href="${attURL(a.name)}" target="_blank" rel="noopener"><img src="${attURL(a.name)}" alt="${esc(a.name)}" loading="lazy"></a>`
          : `<a class="thumb thumb-file" href="${attURL(a.name)}" target="_blank" rel="noopener">${a.media_type === 'application/pdf' ? 'PDF' : 'TXT'}</a>`;
        const ref = isImage ? `![${esc(a.name)}](${esc(lastSeg)}/${esc(a.name)})` : `[${esc(a.name)}](${esc(lastSeg)}/${esc(a.name)})`;
        return `
        <div class="card att-card">
          ${thumb}
          <div class="att-meta">
            <span class="mono">${esc(a.name)}</span>
            <span class="meta">${esc(a.media_type || '')} · ${fmtSize(a.size)}${a.created_by && a.created_by.name ? ' · ' + esc(actorStr(a.created_by)) : ''}${a.created_at ? ' · ' + esc(fmtDate(a.created_at)) : ''}</span>
            <span class="meta">body reference: <code>${ref}</code></span>
            <button class="btn small danger" data-detach="${esc(a.name)}">Detach</button>
          </div>
        </div>`;
      }).join('');
      return `
        ${cards || '<div class="empty">No attachments.</div>'}
        <div class="toolbar" style="margin-top:1rem">
          <input type="file" id="att-file" accept="image/png,image/jpeg,image/webp,application/pdf,text/plain,.txt,.csv,.json" multiple hidden>
          <button class="btn small" id="att-choose">Choose files…</button>
          <span class="provenance" id="att-chosen" style="margin:0"></span>
          <button class="btn small primary" id="att-upload">Attach</button>
        </div>
        <p class="provenance">png / jpeg / webp / pdf / plain text, max 5 MiB each, 20 per entry. Reference a file from the
        body (<code>![alt](${esc(lastSeg)}/name.png)</code> or <code>[name](${esc(lastSeg)}/name.txt)</code>) so it is findable and survives OKF export.</p>`;
    },
    linked: () => '<div class="empty">…</div>',
    usage: () => '<div class="empty">…</div>',
    history: () => '<div class="empty">…</div>',
  };

  function wireAttachments() {
    const fileInput = $('#att-file');
    $('#att-choose').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      $('#att-chosen').textContent = [...fileInput.files].map(f => f.name).join(', ');
    });
    $('#att-upload').addEventListener('click', async () => {
      const files = [...fileInput.files];
      if (!files.length) { toast('Choose files first.'); return; }
      try {
        for (const f of files) {
          await api(attPath(f.name), { method: 'PUT', raw: f });
        }
        toast(files.length > 1 ? `Attached ${files.length} files.` : 'Attached.');
        viewDetail(entry.type, entry.id);
      } catch (e) { toast('Attach failed: ' + e.message); }
    });
    body.querySelectorAll('[data-detach]').forEach(b => b.addEventListener('click', async () => {
      const name = b.dataset.detach;
      if (!confirm(`Detach ${name}? The change is kept as a revision.`)) return;
      try {
        await api(attPath(name), { method: 'DELETE' });
        toast('Detached.');
        viewDetail(entry.type, entry.id);
      } catch (e) { toast('Detach failed: ' + e.message); }
    }));
  }

  const body = $('#tab-body');
  // Lazily loaded tabs: fetch once on first open, then re-render from the
  // cached template. A failed fetch shows in place and retries next open.
  const lazy = {
    usage: async () => {
      const u = await api('/api/v1/usage/' + idPath(entry.type, entry.id));
      return () => `
        <div class="stat-tiles">
          <div class="tile"><div class="num">${u.search_hits ?? 0}</div><div class="lbl">search hits</div></div>
          <div class="tile"><div class="num">${u.fetches ?? 0}</div><div class="lbl">fetches</div></div>
          <div class="tile"><div class="num">${u.compiles ?? 0}</div><div class="lbl">compiles</div></div>
          <div class="tile"><div class="num">${u.worked ?? 0}</div><div class="lbl">worked</div></div>
          <div class="tile"><div class="num">${u.failed ?? 0}</div><div class="lbl">failed</div></div>
        </div>
        <p class="provenance">${u.last_used_at ? 'last used ' + esc(fmtDate(u.last_used_at)) : 'never used'}</p>`;
    },
    linked: async () => {
      const { entries } = await api('/api/v1/backlinks/' + idPath(entry.type, entry.id) + '?limit=100');
      return () => (entries && entries.length)
        ? `<p class="provenance" style="margin:0 0 .8rem">Entries whose links point here — the entry's own links are in the Links tab.</p>`
          + entries.map(hitCard).join('')
        : '<div class="empty">Nothing links to this entry yet.</div>';
    },
    history: async () => {
      const { revisions } = await api('/api/v1/revisions/' + idPath(entry.type, entry.id) + '?limit=200');
      const rows = (revisions || []).map(r => `
        <tr>
          <td class="k mono">#${r.rev}</td>
          <td>
            <div><strong>${esc(r.change)}</strong> · ${esc(actorStr(r.changed_by))} · ${esc(fmtDate(r.changed_at))}</div>
            <details><summary style="cursor:pointer;color:var(--muted);font-size:.84rem">snapshot</summary>
              <pre>${esc(JSON.stringify(r.snapshot, null, 2))}</pre></details>
          </td>
        </tr>`).join('');
      return () => `
        <p class="provenance" style="margin:0 0 .8rem">Every change, newest first — who made it and the entry as of that change.</p>
        <table class="kv">${rows}</table>`;
    },
  };
  async function showTab(name) {
    document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    body.innerHTML = tabs[name]();
    if (name === 'attachments') wireAttachments();
    if (lazy[name]) {
      try {
        tabs[name] = await lazy[name]();
        delete lazy[name];
        if (document.querySelector('#tabs button.active')?.dataset.tab === name) body.innerHTML = tabs[name]();
      } catch (e) {
        if (document.querySelector('#tabs button.active')?.dataset.tab === name) {
          body.innerHTML = `<div class="error-banner">Could not load ${esc(name)}: ${esc(e.message)}</div>`;
        }
      }
    }
  }
  document.querySelectorAll('#tabs button').forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));
  showTab('overview');

  const setStatus = async (status, askNote) => {
    try {
      if (await applyStatus(entry, status, askNote)) {
        toast(`Marked ${status}.`);
        viewDetail(entry.type, entry.id);
      }
    } catch (e) { toast('Failed: ' + e.message); }
  };
  $('#act-verify')?.addEventListener('click', () => setStatus('verified', false));
  $('#act-draft')?.addEventListener('click', () => setStatus('draft', false));
  $('#act-deprecate')?.addEventListener('click', () => setStatus('deprecated', true));
  $('#act-reject')?.addEventListener('click', () => setStatus('rejected', true));
  $('#act-delete').addEventListener('click', async () => {
    if (!confirm(`Soft-delete ${entry.type}/${entry.id}? Revision history is retained.`)) return;
    try {
      await api('/api/v1/knowledge/' + idPath(entry.type, entry.id), { method: 'DELETE' });
      toast('Deleted.');
      location.hash = '#/';
    } catch (e) { toast('Failed: ' + e.message); }
  });
}

// The writable subset of a Knowledge entry (PUT is a full replacement).
function editablePayload(e) {
  const p = { type: e.type, id: e.id, title: e.title };
  for (const k of ['description', 'tags', 'status', 'status_note', 'links', 'attrs', 'body']) {
    if (e[k] !== undefined && e[k] !== null) p[k] = e[k];
  }
  return p;
}

// Apply a status transition (full-replacement PUT), prompting for a
// status_note when the transition needs a recorded reason. Returns true on
// success, false if the user cancelled the note prompt. Throws on API
// failure so callers can toast it. Shared by the detail view and the
// review queue; the entry may be a full Knowledge or a SearchHit (which
// embeds one), since both carry the writable fields.
async function applyStatus(entry, status, askNote) {
  let note;
  if (askNote) {
    note = prompt(`Why ${status}? (recorded as status_note so agents stop re-proposing it)`, entry.status_note || '');
    if (note === null) return false;
  }
  const payload = editablePayload(entry);
  payload.status = status;
  if (note !== undefined) payload.status_note = note;
  await api('/api/v1/knowledge/' + idPath(entry.type, entry.id), { method: 'PUT', body: payload });
  return true;
}

/* ============================== review queue ============================== */

// A draft with zero search hits, older than this, is flagged stale — the
// inventory case (nobody's finding it; a candidate to drop). Sort=usage
// already sinks these to the bottom; the toggle isolates them.
const STALE_DAYS = 14;
const review = { staleOnly: false, all: false };

function viewReview() {
  view.innerHTML = `
    <div class="section-title">Draft review queue</div>
    <p style="color:var(--muted);max-width:48rem">Drafts agents wrote back, most-demanded first — ranked by search hits, how
    often the draft already surfaces when people search. Verify what's true, reject what isn't (the reason is recorded as
    status_note so agents stop re-proposing it). Never-used drafts sink to the bottom; toggle <em>stale</em> to triage them.</p>
    <div class="toolbar">
      <label class="check"><input type="checkbox" id="r-stale" ${review.staleOnly ? 'checked' : ''}>
        stale only (0 hits, ≥ ${STALE_DAYS} days old)</label>
      <span class="grow"></span>
      <button class="btn small" id="r-refresh">Refresh</button>
    </div>
    <div id="review-results"><div class="empty">…</div></div>`;
  $('#r-stale').addEventListener('change', () => { review.staleOnly = $('#r-stale').checked; runReview(); });
  $('#r-refresh').addEventListener('click', runReview);
  runReview();
}

function isStaleDraft(h) {
  const age = daysSince(h.created_at);
  return ((h.usage && h.usage.search_hits) || 0) === 0 && age !== null && age >= STALE_DAYS;
}

async function runReview() {
  const out = $('#review-results');
  if (!out) return;
  const my = runReview._seq = (runReview._seq || 0) + 1;
  const limit = review.all ? 1000 : 100;
  try {
    const { hits } = await api('/api/v1/knowledge?sort=usage&status=draft&limit=' + limit);
    if (my !== runReview._seq || out !== $('#review-results')) return; // stale response
    let list = hits || [];
    if (review.staleOnly) list = list.filter(isStaleDraft);
    if (!list.length) {
      out.innerHTML = `<div class="empty">${review.staleOnly ? 'No stale drafts — nothing gathering dust.' : 'No drafts awaiting review.'}</div>`;
      return;
    }
    out.innerHTML = list.map(reviewCard).join('')
      + ((hits || []).length >= limit
        ? (review.all
          ? `<div class="truncation-note">Showing the first ${limit} drafts (server cap).</div>`
          : `<div class="truncation-note">Showing the first ${limit} drafts ·
               <a href="#" id="review-more">load up to 1000</a></div>`)
        : '');
    $('#review-more')?.addEventListener('click', e => { e.preventDefault(); review.all = true; runReview(); });
    wireReviewActions(out);
  } catch (e) {
    if (my !== runReview._seq || out !== $('#review-results')) return;
    out.innerHTML = `<div class="error-banner">Could not load the review queue: ${esc(e.message)}</div>`;
  }
}

function reviewCard(h) {
  const u = h.usage || {};
  const tags = (h.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const who = actorStr(h.created_by);
  const age = daysSince(h.created_at);
  const usageBits = (u.search_hits || u.fetches || u.compiles)
    ? `🔍 ${u.search_hits || 0} hits · fetched ${u.fetches || 0} · compiled ${u.compiles || 0}`
    : 'no usage yet';
  const outcomeBits = (u.worked || u.failed)
    ? `${u.failed ? '⚠️ ' : ''}worked ${u.worked || 0} · failed ${u.failed || 0}`
    : '';
  const meta = [
    `<span class="mono">ochakai://${esc(h.type)}/${esc(h.id)}</span>`,
    who ? esc(who) : '',
    age !== null ? 'created ' + esc(fmtAge(age)) : '',
    usageBits,
    outcomeBits,
  ].filter(Boolean).join(' · ');
  return `<article class="card" data-type="${esc(h.type)}" data-id="${esc(h.id)}">
    <div class="head">
      <span class="type-ico" title="${esc(h.type)}">${icon(h.type)}</span>
      <a class="title" href="${entryHash(h)}">${esc(h.title)}</a>
      <span class="badge draft">draft</span>
      ${isStaleDraft(h) ? '<span class="badge" title="0 search hits and idle — a candidate to drop">🕸️ stale</span>' : ''}
      ${tags}
      <span class="actions" style="margin-left:auto;display:flex;gap:.45rem">
        <button class="btn small primary" data-act="verify">✓ Verify</button>
        <button class="btn small danger" data-act="reject">Reject</button>
      </span>
    </div>
    <div class="meta">${meta}</div>
    ${h.description ? `<div class="desc">${esc(h.description)}</div>` : ''}
  </article>`;
}

function wireReviewActions(container) {
  container.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', async () => {
    const card = btn.closest('[data-type]');
    const status = btn.dataset.act === 'verify' ? 'verified' : 'rejected';
    // Re-fetch the current entry before a full-replacement PUT: the list
    // row may be stale, and status_note aside, we must not clobber a body
    // edited since the queue loaded.
    let entry;
    try {
      entry = await api('/api/v1/knowledge/' + idPath(card.dataset.type, card.dataset.id));
    } catch (e) { toast('Load failed: ' + e.message); return; }
    try {
      if (await applyStatus(entry, status, status === 'rejected')) {
        toast(`Marked ${status}.`);
        runReview();
      }
    } catch (e) { toast('Failed: ' + e.message); }
  }));
}

      $('#copy-sql').addEventListener('click', async () => {
        await navigator.clipboard.writeText(r.sql || '');
        toast('SQL copied.');
      });
    } catch (e) {
      out.innerHTML = `<div class="error-banner">Compile failed: ${esc(e.message)}</div>`;
    }
  });
}

/* ============================== boot ============================== */

refreshServerChip();
route();
</script>
</body>
</html>
