<!doctype html>
<!-- The bundled web UI for the ochakai REST API (api/openapi.yaml).
     A single self-contained file: no build step, no framework, no CDN.
     Served by `ochakai ui` (loopback) and `ochakai serve-ui` (deployed) —
     both proxy /api/v1 to ochakai, and the page always talks to its own
     origin (design doc 0006). It covers the human-facing API surface —
     a persistent knowledge tree as the primary navigation (an entry's id
     is its path, design docs 0014/0016), directory index pages (each
     tree level rendered like the OKF export's index.md — subdirectories
     with counts, entries with descriptions), search, entry details with
     usage, revision history, backlinks, attachments, create/edit with
     the draft → verified workflow, move with reference rewriting (a Move
     action and tree drag & drop), the draft review queue (sort=usage),
     SQL compilation (a Compile tab on metric entries), and OKF export.
     (/api/v1/context is an agent surface — see api/openapi.yaml.)
     A starting point for building your own UI. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ochakai</title>
<style>
  :root {
    --bg: #f6f8f6;
    --surface: #ffffff;
    --border: #e2e7e2;
    --text: #1d2721;
    --muted: #66736b;
    --accent: #2e7d5b;
    --accent-strong: #226548;
    --accent-weak: #e7f3ec;
    --code-bg: #f3f5f3;
    --shadow: 0 1px 2px rgba(29, 39, 33, .05);
    --shadow-hover: 0 2px 8px rgba(29, 39, 33, .10);
    --draft-fg: #8a6116; --draft-bg: #fdf4dd; --draft-bd: #e5c877;
    --verified-fg: #1e6b43; --verified-bg: #e3f4e9; --verified-bd: #7cc39a;
    --deprecated-fg: #9a4e12; --deprecated-bg: #fcebdd; --deprecated-bd: #e3a370;
    --rejected-fg: #a03434; --rejected-bg: #fbe7e7; --rejected-bd: #dd9494;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141815;
      --surface: #1c211d;
      --border: #313832;
      --text: #e4e9e5;
      --muted: #98a49c;
      --accent: #5cb388;
      --accent-strong: #7cc7a0;
      --accent-weak: #24352b;
      --code-bg: #242a25;
      --shadow: none;
      --shadow-hover: none;
      --draft-fg: #e0bb64; --draft-bg: #37301c; --draft-bd: #6d5c2c;
      --verified-fg: #82d2a5; --verified-bg: #1e3327; --verified-bd: #35624a;
      --deprecated-fg: #e8a465; --deprecated-bg: #382a1d; --deprecated-bd: #6d4d2e;
      --rejected-fg: #e08e8e; --rejected-bg: #382020; --rejected-bd: #6d3535;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color: var(--accent-strong); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  pre {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: .7rem .9rem; overflow-x: auto; font-size: .86em; line-height: 1.5; margin: .6rem 0;
  }
  code { background: var(--code-bg); border-radius: 4px; padding: .1em .35em; font-size: .88em; }
  pre code { background: none; padding: 0; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 1.2rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 1.2rem; height: 3.3rem; position: sticky; top: 0; z-index: 10;
  }
  .brand { font-weight: 700; font-size: 1.08rem; color: var(--text); display: flex; align-items: center; gap: .45rem; white-space: nowrap; }
  .brand:hover { text-decoration: none; }
  .topnav { display: flex; gap: .2rem; align-self: stretch; }
  .topnav a {
    display: flex; align-items: center; padding: 0 .8rem; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; white-space: nowrap;
  }
  .topnav a:hover { color: var(--text); text-decoration: none; }
  .topnav a.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
  /* Narrow screens: brand + actions on the first row, nav tabs on their own row. */
  @media (max-width: 800px) {
    .topbar { flex-wrap: wrap; height: auto; padding-top: .55rem; gap: .5rem .8rem; }
    .topnav { order: 10; flex-basis: 100%; align-self: auto; overflow-x: auto; }
    .topnav a { padding: .1rem .8rem .5rem; }
  }
  .topbar .spacer { flex: 1; }

  /* ---- layout: persistent tree sidebar + content pane ---- */
  .shell { display: grid; grid-template-columns: 17rem minmax(0, 1fr); }
  /* The topbar toggle collapses the sidebar for reading room; the choice
     persists per browser. Narrow screens have their own disclosure, so
     the toggle is desktop-only. */
  .shell.side-collapsed { grid-template-columns: minmax(0, 1fr); }
  .shell.side-collapsed .sidebar { display: none; }
  #side-toggle {
    font: inherit; background: none; border: none; cursor: pointer;
    color: var(--muted); padding: .2rem .45rem; border-radius: 6px; font-size: 1.05rem; line-height: 1;
  }
  #side-toggle:hover { color: var(--text); background: var(--code-bg); }
  @media (max-width: 800px) { #side-toggle { display: none; } }
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    position: sticky; top: 3.3rem; height: calc(100vh - 3.3rem); overflow-y: auto;
    padding: .8rem .7rem 2rem; font-size: .9rem;
  }
  /* Like the filter rail, the sidebar is a disclosure only on narrow
     screens: always open (summary hidden) on desktop, collapsed by
     default on mobile so content isn't pushed below a page of tree. */
  .sidebar summary {
    cursor: pointer; font-weight: 600; font-size: .9rem; padding: .3rem 0;
    color: var(--muted); list-style: none; display: none;
  }
  .sidebar summary::before { content: '▸ '; }
  .sidebar details[open] > summary::before { content: '▾ '; }
  .side-head { display: flex; align-items: center; gap: .4rem; margin-bottom: .5rem; }
  .side-head .lbl {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); font-weight: 600; flex: 1;
  }
  @media (max-width: 800px) {
    .shell { display: block; }
    .sidebar {
      position: static; height: auto; border-right: none;
      border-bottom: 1px solid var(--border); padding: .6rem 1.2rem;
    }
    .sidebar summary { display: block; }
    /* The summary already says Knowledge; keep just the buttons. */
    .side-head .lbl { display: none; }
    .side-head { justify-content: flex-end; }
  }
  main { max-width: 62rem; margin: 0 auto; width: 100%; padding: 1.4rem 1.2rem 4rem; }
  /* Filters ride in a horizontal chip bar under the search box — the tree
     sidebar is already a rail, and a second vertical rail read as a
     doubled sidebar. A disclosure only on narrow screens: open (summary
     hidden) on desktop, collapsed by default on mobile so the search box
     — the primary action — sits at the top. */
  .filterbar { margin-bottom: 1rem; }
  .filterbar summary {
    cursor: pointer; font-weight: 600; font-size: .9rem; padding: .3rem 0;
    color: var(--muted); list-style: none; display: none;
  }
  .filterbar summary::before { content: '▸ '; }
  .filterbar[open] > summary::before { content: '▾ '; }
  @media (max-width: 760px) { .filterbar summary { display: block; } }
  .fb-row { display: flex; flex-wrap: wrap; gap: .35rem .4rem; align-items: center; }
  .fb-row .fb-sep { width: 1px; height: 1.2rem; background: var(--border); margin: 0 .3rem; }
  .fb-row input[type=text] { width: 8rem; font-size: .84rem; padding: .22rem .55rem; border-radius: 999px; }
  .chip {
    display: inline-flex; align-items: center; gap: .3rem; cursor: pointer;
    border: 1px solid var(--border); border-radius: 999px; background: var(--surface);
    padding: .16rem .65rem; font-size: .86rem; color: var(--muted); white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip input { display: none; }
  .chip:has(input:checked) { background: var(--accent-weak); border-color: var(--accent); color: var(--accent-strong); }
  label.check { display: flex; align-items: center; gap: .45rem; cursor: pointer; font-size: .9rem; }
  input[type=checkbox] { accent-color: var(--accent); }
  .count { color: var(--muted); font-size: .8rem; margin-left: auto; }

  /* ---- inputs & buttons ---- */
  input[type=text], input[type=number], select, textarea {
    font: inherit; color: inherit; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: .45rem .65rem; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent-weak); border-color: var(--accent); }
  input:disabled, select:disabled, textarea:disabled {
    background: var(--code-bg); color: var(--muted); cursor: not-allowed;
  }
  textarea { resize: vertical; }
  /* 16px inputs on touch-sized screens so iOS Safari doesn't zoom on focus. */
  @media (max-width: 800px) {
    input[type=text], input[type=number], select, textarea { font-size: 16px; }
  }
  .btn {
    font: inherit; font-weight: 500; cursor: pointer; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    padding: .42rem .85rem; display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap;
  }
  /* Buttons that are anchors must not pick up the global link underline —
     an underlined ＋ reads as a plus-minus toggle. */
  .btn:hover { border-color: var(--accent); color: var(--accent-strong); text-decoration: none; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-strong); color: #fff; }
  .btn.danger:hover { border-color: var(--rejected-bd); color: var(--rejected-fg); }
  .btn.small { padding: .22rem .6rem; font-size: .84rem; }

  .searchbox { display: flex; gap: .6rem; margin-bottom: 1rem; }
  .searchbox input { font-size: 1rem; padding: .55rem .8rem; }

  /* ---- cards ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: .85rem 1.1rem; margin: 0 0 .7rem; box-shadow: var(--shadow);
  }
  .card:hover { box-shadow: var(--shadow-hover); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
  .card[data-href] { cursor: pointer; }
  .card .thumbs { display: flex; gap: .5rem; margin-top: .55rem; flex-wrap: wrap; }
  .card .thumbs img {
    height: 4.5rem; max-width: 11rem; object-fit: cover;
    border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg);
  }
  .card .head { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
  .card .head a.title { font-weight: 600; font-size: 1.02rem; color: var(--text); }
  .card .head a.title:hover { color: var(--accent-strong); }
  .type-ico { font-size: 1rem; }
  .card .meta { color: var(--muted); font-size: .8rem; margin-top: .15rem; overflow-wrap: anywhere; }
  .card .desc { margin-top: .3rem; font-size: .92rem; }
  .card pre { margin-bottom: 0; }

  .badge {
    border-radius: 999px; padding: .06rem .6rem; font-size: .74rem; font-weight: 600;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
  }
  .badge.draft { color: var(--draft-fg); background: var(--draft-bg); border-color: var(--draft-bd); }
  .badge.verified { color: var(--verified-fg); background: var(--verified-bg); border-color: var(--verified-bd); }
  .badge.deprecated { color: var(--deprecated-fg); background: var(--deprecated-bg); border-color: var(--deprecated-bd); }
  .badge.rejected { color: var(--rejected-fg); background: var(--rejected-bg); border-color: var(--rejected-bd); }
  /* The status badge doubles as its own picker: one control shows the
     status and changes it, where four transition buttons used to sit.
     The select sits transparent over the label so the pill hugs the
     current status instead of the widest option ("deprecated"). */
  .badge.status-pick { position: relative; display: inline-flex; align-items: center; gap: .3rem; cursor: pointer; }
  .badge.status-pick::after { content: '▾'; font-size: .65rem; opacity: .7; }
  .badge.status-pick select {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; appearance: none; -webkit-appearance: none; border: 0; padding: 0;
  }
  .badge.status-pick:focus-within { outline: 2px solid var(--accent-weak); }
  .tag {
    border-radius: 999px; padding: .04rem .55rem; font-size: .76rem;
    background: var(--accent-weak); color: var(--accent-strong);
  }
  .empty { color: var(--muted); text-align: center; padding: 2.5rem 0; }
  .weak-matches > summary {
    cursor: pointer; color: var(--muted); font-size: .88rem; padding: .6rem 0;
  }
  .weak-matches .card { opacity: .75; }
  .truncation-note { color: var(--muted); font-size: .86rem; text-align: center; padding: .8rem 0; }
  .feed-banner {
    background: var(--accent-weak); border: 1px solid var(--border); border-radius: 8px;
    padding: .55rem .9rem; margin-bottom: 1rem; font-size: .92rem; color: var(--accent-strong);
  }
  .error-banner {
    background: var(--rejected-bg); border: 1px solid var(--rejected-bd); color: var(--rejected-fg);
    border-radius: 8px; padding: .6rem .9rem; margin: .8rem 0; white-space: pre-wrap; word-break: break-word;
  }

  /* ---- detail ---- */
  .crumbs { color: var(--muted); font-size: .84rem; margin-bottom: .5rem; }
  .crumbs a { color: var(--muted); }
  .detail-head { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; }
  .detail-head h1 { font-size: 1.45rem; margin: 0; }
  .detail-head .actions { margin-left: auto; display: flex; gap: .45rem; flex-wrap: wrap; }
  /* Edit stays a button; the rarer Move / Delete live behind ⋯. */
  .menu { position: relative; }
  .menu > summary { list-style: none; }
  .menu > summary::-webkit-details-marker { display: none; }
  .menu-body {
    position: absolute; right: 0; top: calc(100% + .3rem); z-index: 30; min-width: 9rem;
    display: flex; flex-direction: column; padding: .25rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-hover);
  }
  .menu-body button {
    font: inherit; text-align: left; cursor: pointer; background: none; border: 0;
    border-radius: 6px; padding: .35rem .55rem; color: var(--text); white-space: nowrap;
  }
  .menu-body button:hover { background: var(--accent-weak); color: var(--accent-strong); }
  .menu-body button.danger:hover { background: var(--rejected-bg); color: var(--rejected-fg); }
  .provenance { color: var(--muted); font-size: .84rem; margin: .45rem 0 0; }
  .status-note {
    margin-top: .7rem; border-left: 3px solid var(--border); padding: .1rem .8rem;
    color: var(--muted); font-size: .9rem;
  }
  .tabs { display: flex; gap: .2rem; border-bottom: 1px solid var(--border); margin: 1.1rem 0 1rem; overflow-x: auto; }
  .tabs button {
    font: inherit; font-weight: 500; background: none; border: none; cursor: pointer;
    color: var(--muted); padding: .45rem .8rem; border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap;
  }
  .tabs button:hover { color: var(--text); }
  .tabs button.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
  table.kv { border-collapse: collapse; width: 100%; }
  table.kv td { border-bottom: 1px solid var(--border); padding: .45rem .6rem .45rem 0; vertical-align: top; }
  table.kv td.k { color: var(--muted); width: 11rem; white-space: nowrap; }
  /* Narrow screens: stack key over value so wide values (SQL) get the full width. */
  @media (max-width: 640px) {
    table.kv, table.kv tbody, table.kv tr, table.kv td { display: block; width: auto; }
    table.kv td { border-bottom: none; padding: .1rem 0; }
    table.kv td.k { padding-top: .55rem; }
    table.kv tr { border-bottom: 1px solid var(--border); padding-bottom: .45rem; }
  }
  .stat-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr)); gap: .8rem; max-width: 42rem; }
  .stat-tiles .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
  .tile .num { font-size: 1.7rem; font-weight: 700; }
  .tile .lbl { color: var(--muted); font-size: .82rem; }

  /* ---- markdown body ---- */
  .md h1, .md h2, .md h3 { line-height: 1.3; margin: 1.1em 0 .4em; }
  .md h1 { font-size: 1.3rem; } .md h2 { font-size: 1.15rem; } .md h3 { font-size: 1rem; }
  .md p { margin: .5em 0; }
  .md ul, .md ol { margin: .4em 0; padding-left: 1.5em; }
  .md img { max-width: 100%; border: 1px solid var(--border); border-radius: 8px; display: block; margin: .6rem 0; }

  /* ---- browse tree ---- */
  .browse details.node > summary {
    cursor: pointer; display: flex; gap: .5rem; align-items: baseline;
    padding: .25rem .45rem; border-radius: 6px; list-style-position: outside;
  }
  .browse details.node > summary:hover { background: var(--code-bg); }
  .browse details.node > .children {
    margin-left: .85rem; padding-left: .7rem; border-left: 1px solid var(--border);
  }
  .browse .dir-name { overflow-wrap: anywhere; }
  /* The directory name links to its index page but reads as a tree row,
     not a link; the row highlights when its index page is the current
     route, like .tree-entry.active. */
  .browse a.dir-name { color: inherit; }
  .browse a.dir-name:hover { color: var(--accent-strong); }
  .browse details.node > summary.active { background: var(--accent-weak); }
  .browse .count { color: var(--muted); font-size: .78rem; }
  /* “New entry here” on a directory row — revealed on hover so the tree
     stays quiet; the router prefills the editor's ID with the prefix. */
  .browse .node-new {
    margin-left: auto; visibility: hidden; color: var(--muted);
    padding: 0 .3rem; border-radius: 4px; line-height: 1.2; align-self: center;
  }
  .browse details.node > summary:hover .node-new { visibility: visible; }
  .browse .node-new:hover { color: var(--accent-strong); background: var(--accent-weak); text-decoration: none; }
  .browse .tree-entry {
    display: flex; gap: .45rem; align-items: baseline;
    padding: .22rem .45rem; border-radius: 6px; color: inherit; text-decoration: none;
  }
  .browse .tree-entry:hover { background: var(--code-bg); text-decoration: none; }
  /* Title + a short status hint: the title is the row (the id is in the
     tooltip and the URL), and only non-verified states get a colored dot
     — verified is the norm and needs no flag. */
  .browse .tree-entry .entry-title {
    color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .browse .tree-entry.active { background: var(--accent-weak); }
  .status-dot {
    width: .5rem; height: .5rem; border-radius: 50%; flex-shrink: 0; align-self: center;
  }
  .status-dot.draft { background: var(--draft-fg); }
  .status-dot.deprecated { background: var(--deprecated-fg); }
  .status-dot.rejected { background: var(--rejected-fg); }
  /* Drag-and-drop move targets (directories and the root). */
  .browse details.node > summary.drop-hover, #tree.drop-hover { background: var(--accent-weak); border-radius: 6px; }

  /* ---- attachments ---- */
  .att-card { display: flex; gap: 1rem; align-items: flex-start; }
  .att-card a.thumb { flex-shrink: 0; }
  .att-card img {
    max-width: 13rem; max-height: 9rem; object-fit: contain; display: block;
    border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg);
  }
  .att-card a.thumb-file {
    display: flex; align-items: center; justify-content: center;
    width: 6rem; height: 6rem; font-weight: 600; color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg);
    text-decoration: none;
  }
  .att-card .att-meta { min-width: 0; display: flex; flex-direction: column; gap: .3rem; align-items: flex-start; }
  .att-card .att-meta .mono { overflow-wrap: anywhere; }
  @media (max-width: 620px) { .att-card { flex-direction: column; } }

  /* ---- forms ---- */
  .form { max-width: 46rem; }
  .form .row { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
  @media (max-width: 620px) { .form .row { grid-template-columns: 1fr; } }
  .form .field { margin-bottom: .9rem; }
  .form label.top { display: block; font-size: .84rem; font-weight: 600; margin-bottom: .25rem; }
  .form .hint { color: var(--muted); font-size: .78rem; margin-top: .2rem; }
  .filters-list .filter-row { display: grid; grid-template-columns: 1fr 6.5rem 1fr 2.2rem; gap: .5rem; margin-bottom: .5rem; }

  .section-title { font-size: 1.25rem; font-weight: 700; margin: .2rem 0 1rem; }
  .toolbar { display: flex; align-items: center; gap: .6rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar .grow { flex: 1; }

  #toast {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); border-radius: 8px; padding: .5rem 1rem;
    font-size: .9rem; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: .95; }
</style>
</head>
<body>
<header class="topbar">
  <button id="side-toggle" title="Show / hide the knowledge tree" aria-label="Toggle sidebar">☰</button>
  <a class="brand" href="#/">🍵 ochakai</a>
  <nav class="topnav" id="topnav">
    <a href="#/search" data-route="search">Search</a>
    <a href="#/review" data-route="review">Review</a>
  </nav>
  <span class="spacer"></span>
</header>
<div class="shell" id="shell">
  <aside class="sidebar">
    <details id="side-details">
      <summary>Knowledge tree</summary>
      <div class="side-head">
        <span class="lbl">Knowledge</span>
        <button class="btn small" id="tree-refresh" title="Reload the tree">↻</button>
        <a class="btn small" href="#/new" title="Create a knowledge entry">＋</a>
      </div>
      <div id="tree" class="browse"><div class="empty">…</div></div>
    </details>
  </aside>
  <main id="view"></main>
</div>
<div id="toast"></div>

<script>
'use strict';

/* ============================== helpers ============================== */

const $ = s => document.querySelector(s);
const view = $('#view');

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Keys are the OKF type vocabulary, which is what the server stores
// (design doc 0023). Lookup is case-insensitive to match the server's
// filter matching — the stored spelling is whatever the writer used.
const TYPE_ICONS = { 'Semantic Model': '🧩', 'Metric': '📊', 'Golden Query': '🧾', 'Insight': '💡', 'Glossary Term': '📖', 'BigQuery Dataset': '🗂️', 'BigQuery Table': '🗃️', 'Reference': '🔖' };
const ICON_BY_LOWER = new Map(Object.entries(TYPE_ICONS).map(([k, v]) => [k.toLowerCase(), v]));
const icon = t => ICON_BY_LOWER.get(String(t ?? '').trim().toLowerCase()) || '📄';
const KNOWN_TYPES = Object.keys(TYPE_ICONS);
// Mirrors domain.EqualType: two types name the same kind regardless of
// case or surrounding space, since the stored spelling is the writer's.
const sameType = (a, b) =>
  String(a ?? '').trim().toLowerCase() === String(b ?? '').trim().toLowerCase();
const STATUSES = ['draft', 'verified', 'deprecated', 'rejected'];

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}
function actorStr(a) {
  if (!a || !a.name) return '';
  return (a.kind === 'agent' ? '🤖 ' : '👤 ') + a.name;
}
// Whole days since an ISO timestamp (null for unparseable input).
function daysSince(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : Math.floor((Date.now() - d.getTime()) / 86400000);
}
function fmtAge(days) {
  if (days === null) return '';
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  return days + ' days ago';
}
function fmtSize(n) {
  if (!n && n !== 0) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
// URL path for an entry; the id is a path and its slashes stay real
// separators (design doc 0016).
function idPath(id) {
  return String(id).split('/').map(encodeURIComponent).join('/');
}
const entryHash = e => '#/k/' + idPath(e.id);
// Display name: the title when set, else the id's last segment — with
// title optional, the filename usually is the name (design doc 0022).
const displayTitle = e => e.title || String(e.id).split('/').pop();

// URL for a directory's index page; accepts "a/b" or "a/b/".
const dirHash = p => '#/dir/' + idPath(String(p).replace(/\/+$/, ''));

// crumbTrail renders a breadcrumb of directories: each links to its
// index page and the root "/" goes home (which shows the root index). A
// separator belongs to the directory it closes ("insights/"), so the
// whole crumb is one click target. `leaf` is the current page's own
// segment, shown as plain text — a directory page names itself that way,
// while an entry's breadcrumb stops at its folder (the entry's own name
// is right below it, as the heading).
function crumbTrail(dirs, leaf) {
  let prefix = '', out = '<a href="#/" title="Root index">/</a>';
  for (const d of dirs) {
    prefix += d + '/';
    out += `<a href="${dirHash(prefix)}">${esc(d)}/</a>`;
  }
  return leaf === undefined ? out : out + esc(leaf);
}

/* ---- tiny markdown renderer (headings, lists, code, links, emphasis, images) ---- */
// resolveImg maps an image reference from the body to a URL (the detail
// view resolves entry-relative references to attachment URLs); references
// it cannot resolve stay literal text rather than rendering broken images.
// resolveEntry does the same for links to other entries — the edges the
// server derives from this very text (design doc 0024) — returning a
// route or null.
function md(src, resolveImg, resolveEntry) {
  const lines = String(src ?? '').split('\n');
  let out = '', inCode = false, inList = null, para = [];
  const img = (m, alt, ref) => {
    const url = /^https?:/.test(ref) ? ref : resolveImg && resolveImg(ref);
    return url ? `<img src="${url}" alt="${alt}" loading="lazy">` : m;
  };
  // An http(s) target leaves the app; anything else is a bundle reference,
  // and becomes a link exactly when it names an entry.
  const link = (m, text, ref) => {
    if (/^https?:/.test(ref)) return `<a href="${ref}" target="_blank" rel="noopener">${text}</a>`;
    const route = resolveEntry && resolveEntry(ref);
    return route ? `<a href="${route}">${text}</a>` : m;
  };
  // Everything after the code-span pass is applied outside <code> only:
  // markup shown as an example is text, not markup. That is also the rule
  // the server's link extraction follows (design doc 0024), so what reads
  // as a link here is exactly what became an edge there.
  const outsideCode = (html, fn) =>
    html.split(/(<code>[\s\S]*?<\/code>)/).map((part, i) => i % 2 ? part : fn(part)).join('');
  const inline = s => outsideCode(esc(s).replace(/`([^`]+)`/g, '<code>$1</code>'), t => t
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|\W)\*([^*\n]+)\*(?=\W|$)/g, '$1<em>$2</em>')
    .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, img)
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, link)
    // Bare and autolinked ochakai:// references, which carry no anchor
    // text and read as the target's last segment.
    .replace(/(?:&lt;)?(ochakai:\/\/[^\s&<>()[\]"']+)(?:&gt;)?/g, (m, uri) => {
      const route = resolveEntry && resolveEntry(uri);
      return route ? `<a href="${route}">${uri.split('/').pop()}</a>` : m;
    }));
  const flushPara = () => { if (para.length) { out += '<p>' + inline(para.join(' ')) + '</p>'; para = []; } };
  const flushList = () => { if (inList) { out += `</${inList}>`; inList = null; } };
  for (const line of lines) {
    if (/^```/.test(line)) {
      flushPara(); flushList();
      out += inCode ? '</code></pre>' : '<pre><code>';
      inCode = !inCode;
      continue;
    }
    if (inCode) { out += esc(line) + '\n'; continue; }
    const h = line.match(/^(#{1,3})\s+(.*)/);
    if (h) { flushPara(); flushList(); out += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
    const li = line.match(/^\s*([-*]|\d+\.)\s+(.*)/);
    if (li) {
      flushPara();
      const want = /^\d/.test(li[1]) ? 'ol' : 'ul';
      if (inList !== want) { flushList(); out += `<${want}>`; inList = want; }
      out += '<li>' + inline(li[2]) + '</li>';
      continue;
    }
    if (!line.trim()) { flushPara(); flushList(); continue; }
    para.push(line.trim());
  }
  if (inCode) out += '</code></pre>';
  flushPara(); flushList();
  return out;
}

/* ============================== api ============================== */

// The page always talks to its own origin — both serving paths
// (`ochakai ui`, `ochakai serve-ui`) proxy /api/v1 with the right
// credentials (design doc 0006), so a configurable base URL could only
// break that. Opened as a plain file (development), it targets a local
// `ochakai serve`.
const BASE = location.protocol.startsWith('http') ? location.origin : 'http://localhost:8080';

async function api(path, opts = {}) {
  const init = { method: opts.method || 'GET' };
  if (opts.raw !== undefined) {
    init.body = opts.raw; // raw bytes (attachment upload), no JSON envelope
  } else if (opts.body !== undefined) {
    init.headers = { 'Content-Type': 'application/json' };
    init.body = JSON.stringify(opts.body);
  }
  const res = await fetch(BASE + path, init);
  if (!res.ok) {
    let msg = res.status + ' ' + res.statusText;
    try {
      const text = await res.text();
      try { msg = JSON.parse(text).error || text; } catch { msg = text || msg; }
    } catch { /* keep status text */ }
    throw new Error(msg);
  }
  return res.status === 204 ? null : res.json();
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ============================== router ============================== */

// Set by the editor while it holds unsaved changes: route() asks before
// discarding them on hash navigation, beforeunload warns on real navigation.
let unsaved = null; // () => boolean
window.addEventListener('beforeunload', e => { if (unsaved && unsaved()) e.preventDefault(); });

function route() {
  if (unsaved && unsaved() && !confirm('Discard unsaved changes?')) {
    // Put the URL back; replaceState does not re-fire hashchange.
    history.replaceState(null, '', route._current || '#/');
    return;
  }
  unsaved = null;
  route._current = location.hash || '#/';
  const hash = location.hash.replace(/^#\/?/, '');
  const [head, ...rest] = hash.split('/');
  document.querySelectorAll('#topnav a').forEach(a => a.classList.remove('active'));
  const mark = r => { const a = document.querySelector(`#topnav a[data-route="${r}"]`); if (a) a.classList.add('active'); };
  if (head === 'k' && rest.length >= 1) {
    viewDetail(rest.map(decodeURIComponent).join('/'));
  } else if (head === 'dir') {
    // A directory's index page — the web rendering of the index.md the
    // OKF export generates at every level. #/dir/ (the root) shows the
    // same listing the home page carries.
    viewDir(rest.map(decodeURIComponent).join('/'));
  } else if (head === 'edit' && rest.length >= 1) {
    viewEditor(rest.map(decodeURIComponent).join('/'));
  } else if (head === 'new') {
    // New entry lives in the sidebar's “＋” (global and per-directory)
    // and the search view, not a top-level tab — creating knowledge is
    // part of exploring it. #/new/<prefix>/ prefills the ID with the
    // directory the ＋ was clicked on.
    viewEditor(null, rest.map(decodeURIComponent).join('/'));
  } else if (head === 'browse') {
    // Legacy route from when the tree was a tab; it is the sidebar now.
    location.replace('#/');
    return;
  } else if (head === 'review') {
    mark('review');
    viewReview();
  } else if (head === 'search') {
    mark('search');
    viewExplore();
  } else {
    viewHome();
  }
  markTreeSelection();
}
window.addEventListener('hashchange', route);

// Result cards navigate on a click anywhere in them, not just the title.
// A click on a control (link, button, form field) keeps its own behavior,
// a click that selected text (copying the SQL or the ochakai:// URI) is
// not a navigation, and the title stays a real link for keyboard tabbing
// and open-in-new-tab.
view.addEventListener('click', e => {
  const card = e.target.closest('.card[data-href]');
  if (!card || e.target.closest('a, button, input, textarea, select, label, summary')) return;
  if (getSelection().toString()) return;
  location.hash = card.dataset.href;
});

/* ============================== explore ============================== */

// Filter state survives navigation within the session.
const explore = { q: '', types: new Set(), statuses: new Set(), tag: '', staleFeed: false, feedAll: false };

// If the viewport grows past the breakpoint while the filter disclosure is
// collapsed, its summary disappears — reopen it so filters stay reachable.
matchMedia('(min-width: 761px)').addEventListener('change', e => {
  const d = document.getElementById('filter-details');
  if (d && e.matches) d.open = true;
});

function viewExplore() {
  const typeChips = KNOWN_TYPES.map(t => `
    <label class="chip"><input type="checkbox" data-type="${t}" aria-label="type ${t}" ${explore.types.has(t) ? 'checked' : ''}>
      <span class="type-ico">${icon(t)}</span>${t}</label>`).join('');
  const extraTypes = [...explore.types].filter(t => !KNOWN_TYPES.includes(t)).map(t => `
    <label class="chip"><input type="checkbox" data-type="${esc(t)}" aria-label="type ${esc(t)}" checked>
      <span class="type-ico">${icon(t)}</span>${esc(t)}</label>`).join('');
  const statusChips = STATUSES.map(s => `
    <label class="chip"><input type="checkbox" data-status="${s}" aria-label="status ${s}" ${explore.statuses.has(s) ? 'checked' : ''}>${s}</label>`).join('');
  // Filters collapse into a disclosure on narrow screens; keep it open on
  // wide ones (the summary is hidden there, so it could never be reopened).
  const wide = matchMedia('(min-width: 761px)').matches;

  view.innerHTML = `
  <section>
    <div class="searchbox">
      ${explore.staleFeed
        ? `<div class="feed-banner" style="flex:1;margin-bottom:0">Verification-age feed — oldest verified first,
           the canary list for re-checking golden queries. Uncheck <strong>verification age</strong> to search.</div>`
        : `<input type="text" id="q" placeholder="Search metrics, golden queries, insights, terms, tables…"
                  value="${esc(explore.q)}" autocomplete="off">`}
      <a class="btn" href="#/new" title="Create a knowledge entry">＋ New entry</a>
    </div>
    <details id="filter-details" class="filterbar" ${wide ? 'open' : ''}>
      <summary>Filters</summary>
      <div class="fb-row">
        ${typeChips}${extraTypes}
        <input type="text" id="f-type-extra" placeholder="other type…" aria-label="other type" style="width:6.5rem">
        <span class="fb-sep"></span>
        ${statusChips}
        <span class="fb-sep"></span>
        <input type="text" id="f-tag" placeholder="tag" aria-label="tag" value="${esc(explore.tag)}" style="width:6rem">
        <span class="fb-sep"></span>
        <label class="chip" title="Oldest-verified first — the canary feed for re-checking golden queries"><input
          type="checkbox" id="f-stale" aria-label="verification age feed" ${explore.staleFeed ? 'checked' : ''}>verification age</label>
      </div>
    </details>
    <div id="results"><div class="empty">…</div></div>
  </section>`;

  const rerun = () => runSearch();
  $('#q')?.addEventListener('input', () => { explore.q = $('#q').value; debounce(rerun, 250); });
  // Autofocus is a desktop nicety; on touch screens it pops the keyboard
  // over the page before the user asked for it.
  if (matchMedia('(pointer: fine)').matches) $('#q')?.focus({ preventScroll: true });
  document.querySelectorAll('.fb-row input[data-type]').forEach(cb =>
    cb.addEventListener('change', () => { cb.checked ? explore.types.add(cb.dataset.type) : explore.types.delete(cb.dataset.type); rerun(); }));
  document.querySelectorAll('.fb-row input[data-status]').forEach(cb =>
    cb.addEventListener('change', () => { cb.checked ? explore.statuses.add(cb.dataset.status) : explore.statuses.delete(cb.dataset.status); rerun(); }));
  $('#f-type-extra').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.value.trim()) { explore.types.add(e.target.value.trim()); viewExplore(); }
  });
  $('#f-tag').addEventListener('input', () => { explore.tag = $('#f-tag').value.trim(); debounce(rerun, 250); });
  $('#f-stale').addEventListener('change', () => { explore.staleFeed = $('#f-stale').checked; explore.feedAll = false; viewExplore(); });

  runSearch();
}

function debounce(fn, ms) {
  clearTimeout(debounce._t);
  debounce._t = setTimeout(fn, ms);
}

// Below this score a lexical hit is almost certainly noise: real matches
// carry a 0.3 substring bonus, while trigram similarity of unrelated text
// hovers near the server's 0.05 floor (plus a 0.05 verified boost). Only
// meaningful in lexical mode — hybrid (RRF) scores live on a ~1/60 scale,
// detected below by the top score, where no useful floor exists.
const WEAK_SCORE = 0.15;

async function runSearch() {
  const out = $('#results');
  if (!out) return;
  const p = new URLSearchParams();
  if (explore.staleFeed) p.set('sort', 'verified_at');
  else if (explore.q) p.set('q', explore.q);
  for (const t of explore.types) p.append('type', t);
  for (const s of explore.statuses) p.append('status', s);
  if (explore.tag) p.append('tag', explore.tag);
  // Search caps at 50 server-side; the canary feed pages larger (100,
  // expandable to the server max of 1000 via the load-more note).
  const limit = explore.staleFeed ? (explore.feedAll ? 1000 : 100) : 50;
  p.set('limit', String(limit));
  const my = runSearch._seq = (runSearch._seq || 0) + 1;
  try {
    const { hits } = await api('/api/v1/knowledge?' + p);
    if (my !== runSearch._seq || out !== $('#results')) return; // stale response
    if (!hits || !hits.length) {
      out.innerHTML = `<div class="empty">No knowledge found${explore.q ? ' for “' + esc(explore.q) + '”' : ''}.</div>`;
      return;
    }
    // With a query, split off low-relevance hits so junk doesn't render as
    // if it matched — semantic/trigram search always returns *something*.
    let strong = hits, weak = [];
    if (explore.q && !explore.staleFeed && hits[0].score > 0.05) {
      strong = hits.filter(h => h.score >= WEAK_SCORE);
      weak = hits.filter(h => h.score < WEAK_SCORE);
    }
    let html = strong.map(hitCard).join('');
    if (!strong.length) {
      html = `<div class="empty">No strong matches for “${esc(explore.q)}”.</div>`;
    }
    if (weak.length) {
      html += `<details class="weak-matches"><summary>${weak.length} weak match${weak.length > 1 ? 'es' : ''} —
        barely related, probably noise</summary>${weak.map(hitCard).join('')}</details>`;
    }
    if (hits.length >= limit) {
      html += explore.staleFeed && !explore.feedAll
        ? `<div class="truncation-note">Showing the first ${limit} entries ·
             <a href="#" id="feed-more">load up to 1000</a></div>`
        : `<div class="truncation-note">Showing the first ${limit} ${explore.q ? 'matches' : 'entries'}
             (server cap) — narrow with filters or a more specific query.</div>`;
    }
    out.innerHTML = html;
    $('#feed-more')?.addEventListener('click', e => { e.preventDefault(); explore.feedAll = true; runSearch(); });
  } catch (e) {
    if (my !== runSearch._seq || out !== $('#results')) return;
    out.innerHTML = `<div class="error-banner">Search failed: ${esc(e.message)}</div>`;
  }
}

// Image attachments as small previews on a result card. The metadata
// rides along on REST hits; the bytes are separate GETs the browser
// caches (ETag revalidation — repeat renders cost a 304, not a
// re-download).
function cardThumbs(h) {
  const imgs = (h.attachments || []).filter(a => (a.media_type || '').startsWith('image/')).slice(0, 4);
  if (!imgs.length) return '';
  const src = a => BASE + '/api/v1/attachments/' + idPath(h.id) + '/' + encodeURIComponent(a.name);
  return `<div class="thumbs">${imgs.map(a =>
    `<img src="${src(a)}" alt="${esc(a.name)}" title="${esc(a.name)}" loading="lazy">`).join('')}</div>`;
}

// The card leads with what the entry says (title, status, description,
// SQL); the id, author, and dates live on the detail view — on a result
// list they were noise (the title link's URL still carries the id).
function hitCard(h) {
  const tags = (h.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const sql = h.attrs && h.attrs.sql ? `<pre>${esc(h.attrs.sql)}</pre>` : '';
  return `<article class="card" data-href="${entryHash(h)}">
    <div class="head">
      <span class="type-ico" title="${esc(h.type)}">${icon(h.type)}</span>
      <a class="title" href="${entryHash(h)}" title="ochakai://${esc(h.id)}">${esc(displayTitle(h))}</a>
      <span class="badge ${esc(h.status)}">${esc(h.status)}</span>
      ${tags}
    </div>
    ${h.description ? `<div class="desc">${esc(h.description)}</div>` : ''}
    ${sql}
    ${cardThumbs(h)}
  </article>`;
}

/* ============================== sidebar tree ============================== */

// The folder view of the ID hierarchy (design docs 0014, 0016) is the
// primary navigation: a persistent sidebar where the id's segments are
// directories, loaded one level per request; the root is the top-level
// segments. Expanded nodes survive navigation within the session and
// are restored (re-fetched) on a tree refresh.
const browse = { open: new Set() }; // keys: prefix

// knownDirs are the directory prefixes the tree has loaded, plus the
// root — the completions offered where a destination path is typed.
function knownDirs() {
  const dirs = new Set(['']);
  document.querySelectorAll('#tree details.node').forEach(d => dirs.add(d.dataset.prefix));
  return [...dirs].sort();
}

// refreshTree (re)loads the root level; wireNodes then reloads every
// node restored as open. Called at boot, from the ↻ button, and after
// writes that change what the tree shows (create, delete, status).
async function refreshTree() {
  const tree = $('#tree');
  try {
    const res = await api('/api/v1/browse');
    tree.innerHTML = levelHTML(res, '') || '<div class="empty">No knowledge yet.</div>';
    wireNodes(tree);
    // A deep link may have rendered before the tree existed (boot) or
    // before this refresh; re-reveal the current entry or directory in
    // the new tree (a trailing slash makes revealInTree expand the
    // directory itself, not just its ancestors).
    const m = location.hash.match(/^#\/(?:k|edit)\/(.+)$/);
    const dm = location.hash.match(/^#\/dir\/(.+)$/);
    if (m) revealInTree(m[1].split('/').map(decodeURIComponent).join('/'));
    else if (dm) revealInTree(dm[1].split('/').map(decodeURIComponent).join('/').replace(/\/*$/, '/'));
    else markTreeSelection();
  } catch (e) {
    tree.innerHTML = `<div class="error-banner">Tree failed: ${esc(e.message)}</div>`;
  }
}
$('#tree-refresh').addEventListener('click', refreshTree);

function nodeHTML(prefix, label, count) {
  // The ＋ prefills the editor's ID with this directory — no retyping the
  // full path to create knowledge next to its neighbors.
  return `<details class="node" data-prefix="${esc(prefix)}" ${browse.open.has(prefix) ? 'open' : ''}>
    <summary>${label}<span class="count">${count}</span><a class="node-new"
      href="#/new/${prefix.split('/').filter(Boolean).map(encodeURIComponent).join('/')}/"
      title="New entry in ${esc(prefix)}">＋</a></summary>
    <div class="children"><div class="empty">…</div></div>
  </details>`;
}

// levelHTML renders one browse response: subdirectories, then the
// entries at this level — title-first with a short status hint; the id
// and full status ride in the tooltip. A directory's name is a link to
// its index page (the ▸ marker and the rest of the row still toggle
// expansion). Entries are draggable: dropping one on a directory moves
// it there (references rewritten server-side).
function levelHTML(res, prefix) {
  const dirs = (res.dirs || []).map(dir => nodeHTML(prefix + dir.name + '/',
    `<span class="type-ico">📁</span><a class="dir-name mono" href="${dirHash(prefix + dir.name)}"
       title="Open the index of ${esc(prefix + dir.name)}/">${esc(dir.name)}/</a>`, dir.count)).join('');
  const entries = (res.entries || []).map(e => `
    <a class="tree-entry" data-id="${esc(e.id)}" href="#/k/${idPath(e.id)}" draggable="true"
       title="${esc(e.id)} · ${esc(e.status)}">
      <span class="type-ico" title="${esc(e.type)}">${icon(e.type)}</span>
      <span class="entry-title">${esc(displayTitle(e))}</span>
      ${e.status === 'verified' ? '' : `<span class="status-dot ${esc(e.status)}" title="${esc(e.status)}"></span>`}
    </a>`).join('');
  return dirs + entries;
}

// wireNodes attaches lazy loading to every not-yet-wired node under
// root, and immediately loads the ones restored as open.
function wireNodes(root) {
  root.querySelectorAll('details.node:not([data-wired])').forEach(d => {
    d.dataset.wired = '1';
    const key = d.dataset.prefix;
    d.addEventListener('toggle', () => {
      d.open ? browse.open.add(key) : browse.open.delete(key);
      if (d.open) loadNode(d);
    });
    if (d.open) loadNode(d);
  });
}

// loadNode fetches a node's children once; the in-flight promise is
// kept on the element so revealInTree can await a load it didn't start.
// A failed load clears both, so reopening (or revealing) retries.
function loadNode(d) {
  if (d._load) return d._load;
  d._load = (async () => {
    const box = d.querySelector(':scope > .children');
    const prefix = d.dataset.prefix;
    try {
      const res = await api(`/api/v1/browse?prefix=${encodeURIComponent(prefix)}`);
      const body = levelHTML(res, prefix);
      const note = res.truncated
        ? `<div class="truncation-note">Showing the first 1000 entries at this level — a directory this wide is
           better split into subdirectories.</div>` : '';
      box.innerHTML = (body + note) || '<div class="empty">Empty.</div>';
      wireNodes(box);
      markTreeSelection();
    } catch (e) {
      d._load = null; // reopen retries
      box.innerHTML = `<div class="error-banner">Load failed: ${esc(e.message)}</div>`;
    }
  })();
  return d._load;
}

// revealInTree expands the tree along an entry's ancestor directories
// (loading each level as needed) so the current entry is visible and
// highlighted — the tree always shows where in the hierarchy you are.
async function revealInTree(id) {
  const segs = String(id).split('/');
  let prefix = '';
  for (let i = 0; i < segs.length - 1; i++) {
    prefix += segs[i] + '/';
    const p = prefix;
    const d = [...document.querySelectorAll('#tree details.node')].find(n => n.dataset.prefix === p);
    if (!d) return; // parent level not present (yet) — nothing to reveal
    if (!d.open) d.open = true; // its toggle listener records the state
    await loadNode(d);
  }
  markTreeSelection();
}

// markTreeSelection highlights the tree row for the route currently
// shown — an entry (detail or its editor) or a directory's index page —
// if that part of the tree is loaded.
function markTreeSelection() {
  const m = location.hash.match(/^#\/(?:k|edit)\/(.+)$/);
  const id = m ? m[1].split('/').map(decodeURIComponent).join('/') : null;
  let active = null;
  document.querySelectorAll('#tree .tree-entry').forEach(a => {
    const on = a.dataset.id === id;
    a.classList.toggle('active', on);
    if (on) active = a;
  });
  const dm = location.hash.match(/^#\/dir\/(.+)$/);
  const dirPrefix = dm ? dm[1].split('/').map(decodeURIComponent).join('/').replace(/\/*$/, '/') : null;
  document.querySelectorAll('#tree details.node').forEach(d => {
    const on = d.dataset.prefix === dirPrefix;
    const sum = d.querySelector(':scope > summary');
    sum.classList.toggle('active', on);
    if (on) active = sum;
  });
  active?.scrollIntoView({ block: 'nearest' });
}

// An open ⋯ menu closes on any click outside it, and on Escape.
document.addEventListener('click', e => {
  document.querySelectorAll('details.menu[open]').forEach(m => { if (!m.contains(e.target)) m.open = false; });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('details.menu[open]').forEach(m => { m.open = false; });
});

/* ============================== move ============================== */

// moveEntry renames an entry (POST /api/v1/move) — the server carries
// revisions, usage, and attachments along and rewrites inbound
// references, so nothing breaks. Shared by tree drag & drop and the
// detail view's Move action.
async function moveEntry(from, to) {
  if (!to || to === from) return false;
  try {
    const moved = await api('/api/v1/move', { method: 'POST', body: { from, to } });
    toast(`Moved to ${moved.id}.`);
    refreshTree();
    // If the moved entry is on screen, follow it to its new address.
    const m = location.hash.match(/^#\/(?:k|edit)\/(.+)$/);
    if (m && m[1].split('/').map(decodeURIComponent).join('/') === from) {
      location.hash = '#/k/' + idPath(moved.id);
    }
    return true;
  } catch (e) {
    toast('Move failed: ' + e.message);
    return false;
  }
}

// Tree interactions beyond navigation: the per-directory ＋ (which must
// not toggle its node — preventDefault stops both the summary toggle and
// native link navigation, so route via the hash), and drag & drop moves:
// drop an entry on a directory (or the tree background = the root) to
// move it there, keeping its last segment.
{
  const tree = $('#tree');
  // Links inside a directory row (the per-directory ＋ and the name's
  // index-page link) must not toggle the node — preventDefault stops
  // both the summary toggle and native link navigation, so route via
  // the hash. The directory view then reveals (and expands) its node.
  tree.addEventListener('click', e => {
    const a = e.target.closest('.node-new, a.dir-name');
    if (!a) return;
    e.preventDefault();
    location.hash = a.getAttribute('href');
  });
  let dragId = null;
  const clearDrop = () => {
    tree.classList.remove('drop-hover');
    tree.querySelectorAll('summary.drop-hover').forEach(s => s.classList.remove('drop-hover'));
  };
  tree.addEventListener('dragstart', e => {
    const entry = e.target.closest('.tree-entry');
    if (!entry) return;
    dragId = entry.dataset.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragId);
  });
  tree.addEventListener('dragend', () => { dragId = null; clearDrop(); });
  tree.addEventListener('dragover', e => {
    if (!dragId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearDrop();
    const sum = e.target.closest('details.node > summary');
    if (sum) sum.classList.add('drop-hover');
    else tree.classList.add('drop-hover');
  });
  tree.addEventListener('dragleave', e => { if (e.target === tree) clearDrop(); });
  tree.addEventListener('drop', e => {
    if (!dragId) return;
    e.preventDefault();
    const sum = e.target.closest('details.node > summary');
    const prefix = sum ? sum.parentElement.dataset.prefix : '';
    const from = dragId;
    clearDrop();
    dragId = null;
    const to = prefix + from.split('/').pop();
    if (to === from) return; // dropped on its own directory
    if (confirm(`Move ${from} → ${to}?\nInbound references are rewritten; history follows the entry.`)) {
      moveEntry(from, to);
    }
  });
}

/* ============================== home & directory index ============================== */

// A directory rendered as a page: the web counterpart of the index.md
// the OKF export writes at every level (progressive disclosure) —
// subdirectories with their entry counts, then the entries at this
// level with title and description. The home page shows the root level
// below its intro, so "/" and "#/dir/<prefix>" read the same way.

function dirCard(prefix, d) {
  const href = dirHash(prefix + d.name);
  const noun = d.count === 1 ? 'entry' : 'entries';
  return `<article class="card" data-href="${href}">
    <div class="head">
      <span class="type-ico">📁</span>
      <a class="title mono" href="${href}">${esc(d.name)}/</a>
      <span class="count">${d.count} ${noun}</span>
    </div>
  </article>`;
}

// loadDirIndex fetches one browse level and renders it into container
// (which the caller seeded with a placeholder). Entry cards reuse the
// search result card — browse entries carry no attrs/attachments, so
// they render as title, status, and description.
async function loadDirIndex(container, prefix, emptyText) {
  try {
    const res = await api('/api/v1/browse' + (prefix ? '?prefix=' + encodeURIComponent(prefix) : ''));
    if (!container.isConnected) return; // navigated away while loading
    const dirs = (res.dirs || []).map(d => dirCard(prefix, d)).join('');
    const entries = (res.entries || []).map(hitCard).join('');
    const note = res.truncated
      ? `<div class="truncation-note">Showing the first 1000 entries at this level — a directory this wide is
         better split into subdirectories.</div>` : '';
    container.innerHTML = (dirs + entries + note) || `<div class="empty">${emptyText}</div>`;
  } catch (e) {
    if (!container.isConnected) return;
    container.innerHTML = `<div class="error-banner">Browse failed: ${esc(e.message)}</div>`;
  }
}

function viewDir(rawPrefix) {
  const clean = rawPrefix.replace(/\/+$/, '');
  const prefix = clean ? clean + '/' : '';
  revealInTree(prefix); // expand the tree to (and including) this directory
  const newHref = '#/new/' + (clean ? idPath(clean) + '/' : '');
  const segs = clean ? clean.split('/') : [];
  view.innerHTML = `
    <nav class="crumbs mono">${crumbTrail(segs.slice(0, -1), segs.at(-1))}</nav>
    <div class="toolbar">
      <div class="section-title" style="margin:0"><span class="type-ico">📁</span> <span class="mono">/${esc(prefix)}</span></div>
      <span class="grow"></span>
      <a class="btn small" href="${newHref}" title="Create a knowledge entry in ${esc(prefix) || 'the root'}">＋ New entry here</a>
    </div>
    <div id="dir-index"><div class="empty">…</div></div>`;
  loadDirIndex($('#dir-index'), prefix, 'Nothing here — directories exist through the entries in them.');
}

function viewHome() {
  view.innerHTML = `
    <div class="section-title" style="font-size:1.5rem">🍵 ochakai</div>
    <p style="color:var(--muted);max-width:42rem">Knowledge is a folder tree — an entry's id is its path
    (<code>queries/sales/monthly-revenue</code>), so the tree in the sidebar is the way in: place together
    what should be read together, and browse it like documentation. Search when you don't know where to look.</p>
    <div class="searchbox" style="max-width:36rem">
      <input type="text" id="home-q" placeholder="Search metrics, golden queries, insights, terms, tables…" autocomplete="off">
      <a class="btn" id="home-go" href="#/search">Search</a>
    </div>
    <p style="color:var(--muted);font-size:.9rem">
      <a href="#/review">Review queue</a> — verify or reject what agents drafted ·
      <a href="#/new">＋ New entry</a> ·
      <a href="${BASE}/api/v1/export" title="Download the knowledge base as an OKF bundle (tar.gz)">Export OKF</a>
    </p>
    <div id="home-index" style="margin-top:1.4rem"><div class="empty">…</div></div>`;
  $('#home-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') { explore.q = e.target.value; location.hash = '#/search'; }
  });
  $('#home-go').addEventListener('click', () => { explore.q = $('#home-q').value; });
  if (matchMedia('(pointer: fine)').matches) $('#home-q').focus({ preventScroll: true });
  loadDirIndex($('#home-index'), '', 'No knowledge yet — create the first entry.');
}

/* ============================== detail ============================== */

async function viewDetail(id) {
  revealInTree(id); // in parallel with the entry fetch; harmless on 404
  view.innerHTML = '<div class="empty">…</div>';
  let entry;
  try {
    entry = await api('/api/v1/knowledge/' + idPath(id));
  } catch (e) {
    view.innerHTML = `<div class="error-banner">Could not load ${esc(id)}: ${esc(e.message)}</div>`;
    return;
  }

  const prov = [
    entry.created_by && entry.created_by.name ? `created by ${actorStr(entry.created_by)} ${fmtDate(entry.created_at)}` : `created ${fmtDate(entry.created_at)}`,
    entry.verified_by && entry.verified_by.name ? `verified by ${actorStr(entry.verified_by)} ${fmtDate(entry.verified_at)}` : '',
    entry.rejected_by && entry.rejected_by.name ? `rejected by ${actorStr(entry.rejected_by)} ${fmtDate(entry.rejected_at)}` : '',
    entry.updated_at && entry.updated_at !== entry.created_at ? `updated ${fmtDate(entry.updated_at)}` : '',
  ].filter(Boolean).join(' · ');

  const tags = (entry.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const atts = entry.attachments || [];
  // Metric entries are the compilable knowledge, so their detail view gets
  // a Compile tab instead of a site-wide compile page. The compiler matches
  // metrics by their semantic-model name — conventionally the entry id's
  // last segment (design doc 0018 §4.4) — and the model (a Semantic Model
  // entry id) is seeded from attrs.model when present; left blank, the
  // server resolves it from the Semantic Model entry defining the metric
  // (design doc 0019).
  const compilable = sameType(entry.type, 'Metric');
  const cstate = compilable ? {
    metrics: entry.id.split('/').pop(),
    model: typeof (entry.attrs || {}).model === 'string' ? entry.attrs.model : '',
    dimensions: '', filters: [], tgField: '', tgGrain: '', limit: '',
  } : null;

  view.innerHTML = `
    <nav class="crumbs mono">${crumbTrail(entry.id.split('/').slice(0, -1))} <span class="badge">${esc(entry.type)}</span></nav>
    <div class="detail-head">
      <span class="type-ico" style="font-size:1.4rem">${icon(entry.type)}</span>
      <h1>${esc(displayTitle(entry))}</h1>
      <span class="badge status-pick ${esc(entry.status)}" title="Change status">
        <span aria-hidden="true">${esc(entry.status)}</span>
        <select id="act-status" aria-label="status">
          ${STATUSES.map(s => `<option value="${s}" ${s === entry.status ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </span>
      ${tags}
      <span class="actions">
        <a class="btn small" href="#/edit/${idPath(entry.id)}">Edit</a>
        <details class="menu" id="more-menu">
          <summary class="btn small" title="More actions" aria-label="More actions">⋯</summary>
          <div class="menu-body">
            <button id="act-move" title="Move to another path (references are rewritten)">Move…</button>
            <button class="danger" id="act-delete">Delete…</button>
          </div>
        </details>
      </span>
    </div>
    <div class="provenance">${esc(prov)}</div>
    <div id="move-panel" style="display:none;margin-top:.7rem">
      <div class="toolbar" style="margin-bottom:0">
        <input type="text" id="move-to" class="mono" list="move-dirs" value="${esc(entry.id)}"
               style="max-width:28rem" aria-label="new path">
        <datalist id="move-dirs"></datalist>
        <button class="btn small primary" id="move-go">Move</button>
        <button class="btn small" id="move-cancel">Cancel</button>
      </div>
      <p class="provenance" style="margin-top:.3rem">The entry's new path. Inbound references are rewritten;
      revisions, usage, and attachments follow the entry.</p>
    </div>
    ${entry.status_note ? `<div class="status-note">${esc(entry.status_note)}</div>` : ''}
    <div class="tabs" id="tabs">
      <button data-tab="overview" class="active">Overview</button>
      ${compilable ? '<button data-tab="compile">Compile</button>' : ''}
      <button data-tab="attrs">Attributes</button>
      <button data-tab="links">Links${entry.links && entry.links.length ? ' (' + entry.links.length + ')' : ''}</button>
      <button data-tab="attachments">Attachments${atts.length ? ' (' + atts.length + ')' : ''}</button>
      <button data-tab="linked">Linked from</button>
      <button data-tab="usage">Usage</button>
      <button data-tab="history">History</button>
    </div>
    <div id="tab-body"></div>`;

  // Attachment paths and image resolution (design doc 0008). Body links
  // are OKF bundle references: relative to the entry document's directory
  // (the id's parent), or bundle-root when they start with "/".
  const lastSeg = entry.id.split('/').pop();
  const docDir = entry.id.includes('/') ? entry.id.slice(0, entry.id.lastIndexOf('/')) : '';
  const attPath = name => '/api/v1/attachments/' + idPath(entry.id) + '/' + encodeURIComponent(name);
  const attURL = name => BASE + attPath(name);
  const normalize = p => {
    const out = [];
    for (const seg of p.split('/')) {
      if (!seg || seg === '.') continue;
      if (seg === '..') out.pop(); else out.push(seg);
    }
    return out.join('/');
  };
  const resolveImg = ref => {
    const p = normalize(ref.startsWith('/') ? ref : (docDir ? docDir + '/' : '') + ref);
    const canonical = a => entry.id + '/' + a.name;
    let hit = atts.find(a => p === (a.okf_path || canonical(a)) || p === canonical(a));
    // Forgiving fallback: names are unique within the entry, so a filename
    // match resolves references written against a layout we don't know.
    hit = hit || atts.find(a => a.name === ref.split('/').pop());
    return hit ? attURL(hit.name) : null;
  };
  // Links to other entries, resolved the way the server derives them from
  // this same body (design doc 0024): bundle-absolute "/x/y.md", relative
  // "./y.md" against the document's directory, or the canonical URI. A
  // reference to anything else — an attachment, an external URL, an
  // anchor — is not an entry link and stays literal text.
  const resolveEntry = ref => {
    const target = String(ref).split(/[#?]/)[0];
    if (!target) return null;
    let id;
    if (target.startsWith('ochakai://')) id = normalize(target.slice('ochakai://'.length));
    else if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(target)) return null; // some other scheme
    else if (!target.endsWith('.md')) return null; // an attachment, not an entry
    else {
      const rel = target.slice(0, -'.md'.length);
      id = normalize(rel.startsWith('/') ? rel : (docDir ? docDir + '/' : '') + rel);
    }
    return id ? '#/k/' + idPath(id) : null;
  };

  const tabs = {
    overview: () => `
      ${entry.description ? `<p style="font-size:1.02rem">${esc(entry.description)}</p>` : ''}
      ${entry.body ? `<div class="md">${md(entry.body, resolveImg, resolveEntry)}</div>` : ''}
      ${!entry.description && !entry.body ? '<div class="empty">No description or body.</div>' : ''}`,
    attrs: () => {
      const attrs = entry.attrs || {};
      const keys = Object.keys(attrs);
      if (!keys.length) return '<div class="empty">No structured attributes.</div>';
      return '<table class="kv">' + keys.map(k => {
        const v = attrs[k];
        const rendered = typeof v === 'string' && (k === 'sql' || v.includes('\n'))
          ? `<pre>${esc(v)}</pre>`
          : typeof v === 'string' ? esc(v) : `<pre>${esc(JSON.stringify(v, null, 2))}</pre>`;
        return `<tr><td class="k mono">${esc(k)}</td><td>${rendered}</td></tr>`;
      }).join('') + '</table>';
    },
    // Read-only: links come from the body's markdown links (design doc
    // 0024), so the body editor is where they are changed.
    links: () => {
      const links = entry.links || [];
      if (!links.length) return '<div class="empty">The body links to no other entries yet.</div>';
      return `<p class="provenance" style="margin:0 0 .8rem">Taken from the markdown links in the body — edit the body to change them.</p>`
        + '<table class="kv">' + links.map(l => {
        const target = String(l.target || '').replace(/^ochakai:\/\//, '');
        const href = target ? '#/k/' + idPath(target) : null;
        const text = l.text || target.split('/').pop() || target;
        return `<tr><td class="k">${esc(text)}</td>
          <td>${href ? `<a class="mono" href="${href}">${esc(target)}</a>` : `<span class="mono">${esc(target)}</span>`}</td></tr>`;
      }).join('') + '</table>';
    },
    attachments: () => {
      const cards = atts.map(a => {
        const isImage = (a.media_type || '').startsWith('image/');
        const thumb = isImage
          ? `<a class="thumb" href="${attURL(a.name)}" target="_blank" rel="noopener"><img src="${attURL(a.name)}" alt="${esc(a.name)}" loading="lazy"></a>`
          : `<a class="thumb thumb-file" href="${attURL(a.name)}" target="_blank" rel="noopener">${a.media_type === 'application/pdf' ? 'PDF' : 'TXT'}</a>`;
        const ref = isImage ? `![${esc(a.name)}](${esc(lastSeg)}/${esc(a.name)})` : `[${esc(a.name)}](${esc(lastSeg)}/${esc(a.name)})`;
        return `
        <div class="card att-card">
          ${thumb}
          <div class="att-meta">
            <span class="mono">${esc(a.name)}</span>
            <span class="meta">${esc(a.media_type || '')} · ${fmtSize(a.size)}${a.created_by && a.created_by.name ? ' · ' + esc(actorStr(a.created_by)) : ''}${a.created_at ? ' · ' + esc(fmtDate(a.created_at)) : ''}</span>
            <span class="meta">body reference: <code>${ref}</code></span>
            <button class="btn small danger" data-detach="${esc(a.name)}">Detach</button>
          </div>
        </div>`;
      }).join('');
      return `
        ${cards || '<div class="empty">No attachments.</div>'}
        <div class="toolbar" style="margin-top:1rem">
          <input type="file" id="att-file" accept="image/png,image/jpeg,image/webp,application/pdf,text/plain,.txt,.csv,.json" multiple hidden>
          <button class="btn small" id="att-choose">Choose files…</button>
          <span class="provenance" id="att-chosen" style="margin:0"></span>
          <button class="btn small primary" id="att-upload">Attach</button>
        </div>
        <p class="provenance">png / jpeg / webp / pdf / plain text, max 5 MiB each, 20 per entry. Reference a file from the
        body (<code>![alt](${esc(lastSeg)}/name.png)</code> or <code>[name](${esc(lastSeg)}/name.txt)</code>) so it is findable and survives OKF export.</p>`;
    },
    linked: () => '<div class="empty">…</div>',
    usage: () => '<div class="empty">…</div>',
    history: () => '<div class="empty">…</div>',
  };
  if (compilable) {
    tabs.compile = () => `
      <p class="provenance" style="margin:0 0 1rem">Deterministically compiles this metric from its semantic
      model (a models entry) — ochakai never executes SQL and never guesses. Verified golden queries about the metrics
      are returned alongside; prefer them when they answer the question.</p>
      ${compileFormHTML(cstate)}`;
  }

  function wireAttachments() {
    const fileInput = $('#att-file');
    $('#att-choose').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      $('#att-chosen').textContent = [...fileInput.files].map(f => f.name).join(', ');
    });
    $('#att-upload').addEventListener('click', async () => {
      const files = [...fileInput.files];
      if (!files.length) { toast('Choose files first.'); return; }
      try {
        for (const f of files) {
          await api(attPath(f.name), { method: 'PUT', raw: f });
        }
        toast(files.length > 1 ? `Attached ${files.length} files.` : 'Attached.');
        viewDetail(entry.id);
      } catch (e) { toast('Attach failed: ' + e.message); }
    });
    body.querySelectorAll('[data-detach]').forEach(b => b.addEventListener('click', async () => {
      const name = b.dataset.detach;
      if (!confirm(`Detach ${name}? The change is kept as a revision.`)) return;
      try {
        await api(attPath(name), { method: 'DELETE' });
        toast('Detached.');
        viewDetail(entry.id);
      } catch (e) { toast('Detach failed: ' + e.message); }
    }));
  }

  const body = $('#tab-body');
  // Lazily loaded tabs: fetch once on first open, then re-render from the
  // cached template. A failed fetch shows in place and retries next open.
  const lazy = {
    usage: async () => {
      const u = await api('/api/v1/usage/' + idPath(entry.id));
      return () => `
        <div class="stat-tiles">
          <div class="tile"><div class="num">${u.search_hits ?? 0}</div><div class="lbl">search hits</div></div>
          <div class="tile"><div class="num">${u.fetches ?? 0}</div><div class="lbl">fetches</div></div>
          <div class="tile"><div class="num">${u.compiles ?? 0}</div><div class="lbl">compiles</div></div>
          <div class="tile"><div class="num">${u.worked ?? 0}</div><div class="lbl">worked</div></div>
          <div class="tile"><div class="num">${u.failed ?? 0}</div><div class="lbl">failed</div></div>
        </div>
        <p class="provenance">${u.last_used_at ? 'last used ' + esc(fmtDate(u.last_used_at)) : 'never used'}</p>`;
    },
    linked: async () => {
      const { entries } = await api('/api/v1/backlinks/' + idPath(entry.id) + '?limit=100');
      return () => (entries && entries.length)
        ? `<p class="provenance" style="margin:0 0 .8rem">Entries whose links point here — the entry's own links are in the Links tab.</p>`
          + entries.map(hitCard).join('')
        : '<div class="empty">Nothing links to this entry yet.</div>';
    },
    history: async () => {
      const { revisions } = await api('/api/v1/revisions/' + idPath(entry.id) + '?limit=200');
      const rows = (revisions || []).map(r => `
        <tr>
          <td class="k mono">#${r.rev}</td>
          <td>
            <div><strong>${esc(r.change)}</strong> · ${esc(actorStr(r.changed_by))} · ${esc(fmtDate(r.changed_at))}</div>
            <details><summary style="cursor:pointer;color:var(--muted);font-size:.84rem">snapshot</summary>
              <pre>${esc(JSON.stringify(r.snapshot, null, 2))}</pre></details>
          </td>
        </tr>`).join('');
      return () => `
        <p class="provenance" style="margin:0 0 .8rem">Every change, newest first — who made it and the entry as of that change.</p>
        <table class="kv">${rows}</table>`;
    },
  };
  async function showTab(name) {
    document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    body.innerHTML = tabs[name]();
    if (name === 'attachments') wireAttachments();
    if (name === 'compile') wireCompileForm(cstate);
    if (lazy[name]) {
      try {
        tabs[name] = await lazy[name]();
        delete lazy[name];
        if (document.querySelector('#tabs button.active')?.dataset.tab === name) body.innerHTML = tabs[name]();
      } catch (e) {
        if (document.querySelector('#tabs button.active')?.dataset.tab === name) {
          body.innerHTML = `<div class="error-banner">Could not load ${esc(name)}: ${esc(e.message)}</div>`;
        }
      }
    }
  }
  document.querySelectorAll('#tabs button').forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));
  showTab('overview');

  // Status is a picker, not a row of transition buttons: any transition
  // the API allows is offered (provenance over authorization, design doc
  // 0002), and picking "draft" again undoes a stray verify. Deprecate and
  // reject ask for a reason; a cancelled prompt puts the picker back.
  const statusPick = $('#act-status');
  statusPick.addEventListener('change', async () => {
    const status = statusPick.value;
    try {
      if (await applyStatus(entry, status, status === 'deprecated' || status === 'rejected')) {
        toast(`Marked ${status}.`);
        refreshTree(); // the tree shows status badges
        viewDetail(entry.id);
        return;
      }
    } catch (e) { toast('Failed: ' + e.message); }
    statusPick.value = entry.status;
  });
  // The Move panel: a destination input seeded with the current path,
  // with every directory the tree has loaded (plus the root) offered as
  // a completion — pick one or edit the path directly.
  const closeMenu = () => { $('#more-menu').open = false; };
  $('#act-move').addEventListener('click', () => {
    closeMenu();
    $('#move-panel').style.display = '';
    const last = entry.id.split('/').pop();
    $('#move-dirs').innerHTML = knownDirs().map(p => `<option value="${esc(p + last)}">`).join('');
    $('#move-to').focus();
  });
  $('#move-cancel').addEventListener('click', () => { $('#move-panel').style.display = 'none'; });
  $('#move-go').addEventListener('click', () => moveEntry(entry.id, $('#move-to').value.trim()));
  $('#move-to').addEventListener('keydown', e => {
    if (e.key === 'Enter') moveEntry(entry.id, $('#move-to').value.trim());
  });
  $('#act-delete').addEventListener('click', async () => {
    closeMenu();
    if (!confirm(`Soft-delete ${entry.id}? Revision history is retained.`)) return;
    try {
      await api('/api/v1/knowledge/' + idPath(entry.id), { method: 'DELETE' });
      toast('Deleted.');
      refreshTree();
      location.hash = '#/';
    } catch (e) { toast('Failed: ' + e.message); }
  });
}

// The writable subset of a Knowledge entry (PUT is a full replacement).
// links is not in it — the server derives links from body (design doc
// 0024) and ignores whatever a payload carries.
function editablePayload(e) {
  const p = { type: e.type, id: e.id, title: e.title };
  for (const k of ['description', 'tags', 'status', 'status_note', 'attrs', 'body']) {
    if (e[k] !== undefined && e[k] !== null) p[k] = e[k];
  }
  return p;
}

// Apply a status transition (full-replacement PUT), prompting for a
// status_note when the transition needs a recorded reason. Returns true on
// success, false if the user cancelled the note prompt. Throws on API
// failure so callers can toast it. Shared by the detail view and the
// review queue; the entry may be a full Knowledge or a SearchHit (which
// embeds one), since both carry the writable fields.
async function applyStatus(entry, status, askNote) {
  let note;
  if (askNote) {
    note = prompt(`Why ${status}? (recorded as status_note so agents stop re-proposing it)`, entry.status_note || '');
    if (note === null) return false;
  }
  const payload = editablePayload(entry);
  payload.status = status;
  if (note !== undefined) payload.status_note = note;
  await api('/api/v1/knowledge/' + idPath(entry.id), { method: 'PUT', body: payload });
  return true;
}

/* ============================== review queue ============================== */

// A draft with zero search hits, older than this, is flagged stale — the
// inventory case (nobody's finding it; a candidate to drop). Sort=usage
// already sinks these to the bottom; the toggle isolates them.
const STALE_DAYS = 14;
const review = { staleOnly: false, all: false };

function viewReview() {
  view.innerHTML = `
    <div class="section-title">Draft review queue</div>
    <p style="color:var(--muted);max-width:48rem">Drafts agents wrote back, most-demanded first — ranked by search hits, how
    often the draft already surfaces when people search. Verify what's true, reject what isn't (the reason is recorded as
    status_note so agents stop re-proposing it). Never-used drafts sink to the bottom; toggle <em>stale</em> to triage them.</p>
    <div class="toolbar">
      <label class="check"><input type="checkbox" id="r-stale" ${review.staleOnly ? 'checked' : ''}>
        stale only (0 hits, ≥ ${STALE_DAYS} days old)</label>
    </div>
    <div id="review-results"><div class="empty">…</div></div>`;
  $('#r-stale').addEventListener('change', () => { review.staleOnly = $('#r-stale').checked; runReview(); });
  runReview();
}

function isStaleDraft(h) {
  const age = daysSince(h.created_at);
  return ((h.usage && h.usage.search_hits) || 0) === 0 && age !== null && age >= STALE_DAYS;
}

async function runReview() {
  const out = $('#review-results');
  if (!out) return;
  const my = runReview._seq = (runReview._seq || 0) + 1;
  const limit = review.all ? 1000 : 100;
  try {
    const { hits } = await api('/api/v1/knowledge?sort=usage&status=draft&limit=' + limit);
    if (my !== runReview._seq || out !== $('#review-results')) return; // stale response
    let list = hits || [];
    if (review.staleOnly) list = list.filter(isStaleDraft);
    if (!list.length) {
      out.innerHTML = `<div class="empty">${review.staleOnly ? 'No stale drafts — nothing gathering dust.' : 'No drafts awaiting review.'}</div>`;
      return;
    }
    out.innerHTML = list.map(reviewCard).join('')
      + ((hits || []).length >= limit
        ? (review.all
          ? `<div class="truncation-note">Showing the first ${limit} drafts (server cap).</div>`
          : `<div class="truncation-note">Showing the first ${limit} drafts ·
               <a href="#" id="review-more">load up to 1000</a></div>`)
        : '');
    $('#review-more')?.addEventListener('click', e => { e.preventDefault(); review.all = true; runReview(); });
    wireReviewActions(out);
  } catch (e) {
    if (my !== runReview._seq || out !== $('#review-results')) return;
    out.innerHTML = `<div class="error-banner">Could not load the review queue: ${esc(e.message)}</div>`;
  }
}

function reviewCard(h) {
  const u = h.usage || {};
  const tags = (h.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const who = actorStr(h.created_by);
  const age = daysSince(h.created_at);
  const usageBits = (u.search_hits || u.fetches || u.compiles)
    ? `🔍 ${u.search_hits || 0} hits · fetched ${u.fetches || 0} · compiled ${u.compiles || 0}`
    : 'no usage yet';
  const outcomeBits = (u.worked || u.failed)
    ? `${u.failed ? '⚠️ ' : ''}worked ${u.worked || 0} · failed ${u.failed || 0}`
    : '';
  const meta = [
    who ? esc(who) : '',
    age !== null ? 'created ' + esc(fmtAge(age)) : '',
    usageBits,
    outcomeBits,
  ].filter(Boolean).join(' · ');
  return `<article class="card" data-id="${esc(h.id)}" data-href="${entryHash(h)}">
    <div class="head">
      <span class="type-ico" title="${esc(h.type)}">${icon(h.type)}</span>
      <a class="title" href="${entryHash(h)}" title="ochakai://${esc(h.id)}">${esc(displayTitle(h))}</a>
      <span class="badge draft">draft</span>
      ${isStaleDraft(h) ? '<span class="badge" title="0 search hits and idle — a candidate to drop">🕸️ stale</span>' : ''}
      ${tags}
      <span class="actions" style="margin-left:auto;display:flex;gap:.45rem">
        <button class="btn small primary" data-act="verify">✓ Verify</button>
        <button class="btn small danger" data-act="reject">Reject</button>
      </span>
    </div>
    <div class="meta">${meta}</div>
    ${h.description ? `<div class="desc">${esc(h.description)}</div>` : ''}
    ${cardThumbs(h)}
  </article>`;
}

function wireReviewActions(container) {
  container.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', async () => {
    const card = btn.closest('[data-id]');
    const status = btn.dataset.act === 'verify' ? 'verified' : 'rejected';
    // Re-fetch the current entry before a full-replacement PUT: the list
    // row may be stale, and status_note aside, we must not clobber a body
    // edited since the queue loaded.
    let entry;
    try {
